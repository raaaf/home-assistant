# ============================================================================
# LEGACY PLATFORM SENSORS
# ============================================================================

# Zeit und Datum
- platform: time_date
  display_options:
    - "date"
    - "date_time_iso"

# Waste Collection Schedule - Übersicht
- platform: waste_collection_schedule
  name: next_collection
  value_template: '{{ value.types | join(", ") }}'

# Waste Collection Schedule - Einzelne Müllarten
- platform: waste_collection_schedule
  name: Restmuell
  details_format: "upcoming"
  value_template: &waste_days_template >
    {% if value.daysTo == 0 %}
      Heute
    {% elif value.daysTo == 1 %}
      Morgen
    {% else %}
      in {{ value.daysTo }} Tagen
    {% endif %}
  types:
    - Restmuell

- platform: waste_collection_schedule
  name: Bioabfall
  details_format: "upcoming"
  value_template: *waste_days_template
  types:
    - Bioabfall

- platform: waste_collection_schedule
  name: Altpapier
  details_format: "upcoming"
  value_template: *waste_days_template
  types:
    - Papier

- platform: waste_collection_schedule
  name: Gelbersack
  details_format: "upcoming"
  value_template: *waste_days_template
  types:
    - GelberSack

# History Stats - Heizungen (je Raum)
- platform: history_stats
  name: Heizung Schlafzimmer An
  entity_id: switch.sonoff_switch_04
  state: "on"
  type: time
  start: "{{ now().replace(hour=0, minute=0, second=0) }}"
  end: "{{ now() }}"

- platform: history_stats
  name: Heizung Badezimmer An
  entity_id: switch.sonoff_switch_01
  state: "on"
  type: time
  start: "{{ now().replace(hour=0, minute=0, second=0) }}"
  end: "{{ now() }}"

- platform: history_stats
  name: Heizung Flur An
  entity_id: switch.sonoff_switch_02
  state: "on"
  type: time
  start: "{{ now().replace(hour=0, minute=0, second=0) }}"
  end: "{{ now() }}"

- platform: history_stats
  name: Heizung Wohnzimmer An
  entity_id: switch.sonoff_switch_05
  state: "on"
  type: time
  start: "{{ now().replace(hour=0, minute=0, second=0) }}"
  end: "{{ now() }}"

- platform: history_stats
  name: Heizung Kinderzimmer An
  entity_id: switch.sonoff_switch_03
  state: "on"
  type: time
  start: "{{ now().replace(hour=0, minute=0, second=0) }}"
  end: "{{ now() }}"

# NOTE: Former legacy "platform: template" sensors were migrated to the
# modern template: block in configuration.yaml (legacy syntax removed in HA 2026.6).

# ============================================================================
# ENERGY INTEGRATION SENSORS (kWh)
# ============================================================================

- platform: integration
  source: sensor.netzbezug
  name: Netzbezug Energie
  unit_prefix: k
  round: 3
  method: trapezoidal
  unit_time: h
  unique_id: netzbezug_energie

- platform: integration
  source: sensor.einspeisung
  name: Einspeisung Energie
  unit_prefix: k
  round: 3
  method: trapezoidal
  unit_time: h
  unique_id: einspeisung_energie

# Klimaanlage: Riemann-Integral aus sensor.ac_power. Die nativen Midea-Zaehler
# (ac_total_energy/ac_current_energy) sind seit dem Umstellen des midea_ac
# Energy/Power Data Format auf BCD ebenfalls plausibel und koennten alternativ
# direkt genutzt werden; das Integral bleibt als verdrahtete Quelle bestehen.
- platform: integration
  source: sensor.ac_power
  name: Klimaanlage Energie
  unit_prefix: k
  round: 3
  method: trapezoidal
  unit_time: h
  unique_id: klimaanlage_energie
