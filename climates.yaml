# ============================================================================
# DUAL SMART THERMOSTAT CONFIGURATION - DISABLED
# ============================================================================
# REASON: Floor heating has 1-2 hour warmup time, making reactive thermostats
# inefficient (constant on/off cycling). Using predictive time-based control instead.
# Manual control via switches: switch.heizung_* remains available
# ============================================================================

# # Schlafzimmer - Smart thermostat with window sensor (optimized for thermal mass)
# - platform: dual_smart_thermostat
#   name: "Schlafzimmer"
#   unique_id: thermostat_schlafzimmer
#   heater: switch.sonoff_switch_04
#   target_sensor: sensor.arbeitszimmer_temperatur
#   target_temp: 20
#   precision: 0.5
#   min_temp: 12
#   max_temp: 28
#   ac_mode: false
#   cold_tolerance: 0.5
#   hot_tolerance: 0.4
#   keep_alive:
#     minutes: 20
#   min_cycle_duration:
#     minutes: 15
#   initial_hvac_mode: "heat"
#   away:
#     temperature: 14
#   eco:
#     temperature: 18
#   home:
#     temperature: 20
#   openings:
#     - entity_id: binary_sensor.aqara_contact_07
#       timeout: 00:30:00

