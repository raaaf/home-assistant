# Notifications - Alerts.Yaml
# Generated by automation splitter - 5 automations
# Part of Home Assistant configuration

- id: '1663078632677'
  alias: Notification » Es hat geklingelt
  description: Benachrichtigt bei Türklingel und lässt Lichter drei Mal blinken
  triggers:
  - entity_id: binary_sensor.nuki_haustur_ring_action
    from: 'off'
    to: 'on'
    trigger: state
  conditions:
  - condition: template
    value_template: " {% set last = state_attr('automation.notification_es_hat_geklingelt',\
      \ 'last_triggered') %}\n    {{ last is none or (now() - last).total_seconds()\
      \ > 60 }}"
  actions:
  - variables:
      rafael_zuhause: "{{ has_value('person.rafael') and is_state('person.rafael', 'home') }}"
      alex_zuhause: "{{ has_value('person.alex') and is_state('person.alex', 'home') }}"
      niemand_zuhause: "{{ has_value('input_boolean.alle_sind_weg') and is_state('input_boolean.alle_sind_weg', 'on') }}"
      ist_dunkel: "{{ has_value('input_boolean.es_ist_dunkel') and is_state('input_boolean.es_ist_dunkel', 'on') }}"
      anwesenheits_status: >
        {% if rafael_zuhause and alex_zuhause %}
          Beide zuhause
        {% elif rafael_zuhause %}
          Rafael zuhause
        {% elif alex_zuhause %}
          Alex zuhause
        {% else %}
          Niemand zuhause
        {% endif %}
  - choose:
    - alias: "Beide sind zuhause"
      conditions:
      - condition: template
        value_template: "{{ rafael_zuhause and alex_zuhause }}"
      sequence:
      - action: notify.mobile_app_macbook_pro_rafael
        data:
          title: "Haustür Klingel"
          message: "{{ now().strftime('%A, %H:%M Uhr, %d.%m.%Y') }} - {{ anwesenheits_status }}"
          data:
            push:
              interruption-level: critical
      - action: notify.mobile_app_macbook_pro_2
        data:
          title: "Haustür Klingel"
          message: "{{ now().strftime('%A, %H:%M Uhr, %d.%m.%Y') }} - {{ anwesenheits_status }}"
          data:
            push:
              interruption-level: critical
    - alias: "Nur Rafael ist zuhause"
      conditions:
      - condition: template
        value_template: "{{ rafael_zuhause and not alex_zuhause }}"
      sequence:
      - action: notify.mobile_app_macbook_pro_rafael
        data:
          title: "Haustür Klingel"
          message: "{{ now().strftime('%A, %H:%M Uhr, %d.%m.%Y') }} - {{ anwesenheits_status }}"
          data:
            push:
              interruption-level: critical
    - alias: "Nur Alex ist zuhause"
      conditions:
      - condition: template
        value_template: "{{ alex_zuhause and not rafael_zuhause }}"
      sequence:
      - action: notify.mobile_app_macbook_pro_2
        data:
          title: "Haustür Klingel"
          message: "{{ now().strftime('%A, %H:%M Uhr, %d.%m.%Y') }} - {{ anwesenheits_status }}"
          data:
            push:
              interruption-level: critical
    - alias: "Niemand ist zuhause"
      conditions:
      - condition: template
        value_template: "{{ niemand_zuhause }}"
      sequence:
      - action: notify.mobile_app_iphone_rafael
        data:
          title: "Haustür Klingel"
          message: "{{ now().strftime('%A, %H:%M Uhr, %d.%m.%Y') }} - {{ anwesenheits_status }}"
          data:
            push:
              interruption-level: critical
  - alias: "Akzentlichter blinken lassen (nur tagsüber)"
    choose:
    - conditions:
      - condition: template
        value_template: "{{ not ist_dunkel }}"
      sequence:
      - alias: "Aktuellen Zustand der Akzentlichter sichern"
        action: scene.create
        data:
          scene_id: klingel_snapshot
          snapshot_entities:
          - light.philips_light_01_pc_1
          - light.philips_light_02_pc_2
          - light.ikea_light_04
          - light.philips_light_15_bett
          - light.philips_light_16_tv
          - light.philips_light_21_schrank_1
          - light.philips_light_22_schrank_2
          - light.philips_light_23_schrank_3
      - alias: "3x blinken"
        repeat:
          count: 3
          sequence:
          - action: light.turn_on
            target:
              entity_id:
              - light.alle_arbeitszimmer_nachtlichter
              - light.philips_light_15_bett
              - light.philips_light_16_tv
              - light.philips_light_21_schrank_1
              - light.philips_light_22_schrank_2
              - light.philips_light_23_schrank_3
            data:
              brightness_pct: 100
              transition: 0
          - delay:
              milliseconds: 500
          - action: light.turn_off
            target:
              entity_id:
              - light.alle_arbeitszimmer_nachtlichter
              - light.philips_light_15_bett
              - light.philips_light_16_tv
              - light.philips_light_21_schrank_1
              - light.philips_light_22_schrank_2
              - light.philips_light_23_schrank_3
            data:
              transition: 0
          - delay:
              milliseconds: 500
      - alias: "Ursprünglichen Zustand wiederherstellen"
        action: scene.turn_on
        target:
          entity_id: scene.klingel_snapshot
        data:
          transition: 1
      - delay:
          seconds: 2
      - alias: "Wiederherstellung absichern (gegen traege Geraete)"
        action: scene.turn_on
        target:
          entity_id: scene.klingel_snapshot
        data:
          transition: 1
      - alias: "Adaptive Lighting Manual-Control vom Blinken zuruecknehmen"
        parallel:
        - action: adaptive_lighting.set_manual_control
          data:
            entity_id: switch.adaptive_lighting_arbeitszimmer
            manual_control: false
            lights:
            - light.philips_light_01_pc_1
            - light.philips_light_02_pc_2
            - light.ikea_light_04
        - action: adaptive_lighting.set_manual_control
          data:
            entity_id: switch.adaptive_lighting_schlafzimmer
            manual_control: false
            lights:
            - light.philips_light_15_bett
            - light.philips_light_16_tv
        - action: adaptive_lighting.set_manual_control
          data:
            entity_id: switch.adaptive_lighting_wohnzimmer
            manual_control: false
            lights:
            - light.philips_light_21_schrank_1
            - light.philips_light_22_schrank_2
            - light.philips_light_23_schrank_3
  mode: single
  max_exceeded: silent
- id: '1692865362999'
  alias: Notification » Wasserspender
  description: Überwacht Wasserspender und benachrichtigt bei leerem Tank, Pumpenprobleme
    oder Reinigungsbedarf
  triggers:
  - trigger: state
    entity_id: binary_sensor.mmgg_wi11_7a1c_no_water_flag
    to: 'on'
    id: wasser-leer
  - trigger: state
    entity_id: binary_sensor.mmgg_wi11_7a1c_pump_block_flag
    to: 'on'
    id: pumpe
  - entity_id:
    - sensor.mmgg_wi11_7a1c_remain_clean_time
    from: '2'
    to: '1'
    id: clean
    trigger: state
  conditions:
  - condition: template
    value_template: " {% set last = state_attr('automation.notification_wasserspender',\
      \ 'last_triggered') %}\n    {{ last is none or (now() - last).total_seconds()\
      \ > 12 * 60 * 60 }}"
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - wasser-leer
      sequence:
      - action: notify.rafael
        data:
          title: "Wasserspender — Braucht Wasser"
          message: "Wassertank ist leer. Bitte auffüllen."
      - action: persistent_notification.create
        data:
          title: "Wasserspender — Braucht Wasser"
          message: "Wassertank ist leer. Bitte den Wasserspender mit frischem Wasser auffüllen."
          notification_id: wasserspender_wasser
    - conditions:
      - condition: trigger
        id:
        - pumpe
      sequence:
      - action: notify.rafael
        data:
          title: "Wasserspender — Pumpe prüfen"
          message: "Pumpe blockiert. Bitte überprüfen."
      - action: persistent_notification.create
        data:
          title: "Wasserspender — Pumpe prüfen"
          message: "Pumpe blockiert. Bitte die Pumpe des Wasserspenders überprüfen und eventuelle Blockierungen beheben."
          notification_id: wasserspender_pumpe
    - conditions:
      - condition: trigger
        id:
        - clean
      sequence:
      - action: notify.rafael
        data:
          title: "Wasserspender — Reinigung erforderlich"
          message: "Zeit für die regelmäßige Reinigung."
      - action: persistent_notification.create
        data:
          title: "Wasserspender — Reinigung erforderlich"
          message: "Es ist Zeit für die regelmäßige Reinigung des Wasserspenders."
          notification_id: wasserspender_reinigung
  mode: single
- id: '1700477276036'
  alias: Notification » Season Change
  description: Sendet Benachrichtigung beim Jahreszeitenwechsel
  triggers:
  - entity_id: sensor.season
    to: spring
    id: Frühling
    trigger: state
  - entity_id: sensor.season
    to: summer
    id: Sommer
    trigger: state
  - entity_id: sensor.season
    to: autumn
    id: Herbst
    trigger: state
  - entity_id: sensor.season
    to: winter
    id: Winter
    trigger: state
  conditions: []
  actions:
  - action: logbook.log
    data:
      name: Jahreszeitenwechsel
      message: Wir haben jetzt {{ trigger.id }}!
      domain: automation
  mode: single
  max_exceeded: silent
- id: '1714059235372'
  alias: Notification » CO2 zu hoch
  description: "Benachrichtigt bei hohem CO2. Tagsüber ab 1800 ppm, nachts ab 2000 ppm (Ventilator reicht nicht)."
  triggers:
  - entity_id:
    - sensor.qingping_air_monitor_lite_co2_carbon_dioxide
    above: 1800
    for:
      minutes: 5
    trigger: numeric_state
    id: 'co2-high'
  - entity_id:
    - sensor.qingping_air_monitor_lite_co2_carbon_dioxide
    above: 2000
    for:
      minutes: 10
    trigger: numeric_state
    id: 'co2-critical'
  conditions:
  - condition: template
    value_template: "{{ states('sensor.qingping_air_monitor_lite_co2_carbon_dioxide') not in ['unknown', 'unavailable'] }}"
  - condition: template
    value_template: >-
      {% set last = state_attr('automation.notification_co2_zu_hoch', 'last_triggered') %}
      {{ last is none or (now() - last).total_seconds() > 30 * 60 }}
  - condition: or
    conditions:
    # Tagsüber: ab 1800 ppm (wie bisher)
    - condition: and
      conditions:
      - condition: trigger
        id: 'co2-high'
      - condition: state
        entity_id: input_boolean.schlafenszeit
        state: 'off'
    # Nachts: erst ab 2000 ppm (Ventilator sollte helfen, aber reicht nicht)
    - condition: trigger
      id: 'co2-critical'
  actions:
  - action: script.notify_critical
    data:
      tag: co2_critical
      title: >-
        CO2 zu hoch, {{ 'Fenster öffnen' if is_state('input_boolean.schlafenszeit', 'on') else 'Fenster auf im Arbeitszimmer' }}
      message: >-
        Der Wert liegt aktuell bei {{ states('sensor.qingping_air_monitor_lite_co2_carbon_dioxide') | int(0) }} ppm!
        {{ ' Ventilator läuft bereits auf ' ~ states('sensor.fan_speed_schlafzimmer_co2_calculated') ~ '%.' if is_state('fan.schlafzimmer', 'on') else '' }}
  mode: single
- id: '1715850119149'
  alias: Notifications » Temperatur Aussen
  description: Benachrichtigt wenn Außentemperatur 30°C übersteigt
  triggers:
  - trigger: numeric_state
    entity_id: sensor.temperatur_aussen
    above: 30
    for:
      hours: 0
      minutes: 0
      seconds: 30
  conditions:
  - condition: template
    value_template: "{{ states('sensor.temperatur_aussen') not in ['unknown', 'unavailable'] }}"
  - condition: template
    value_template: " {% set last = state_attr('automation.notifications_temperatur_aussen',\
      \ 'last_triggered') %}\n    {{ last is none or (now() - last).total_seconds()\
      \ > 12 * 60 * 60 }}"
  actions:
  - action: logbook.log
    data:
      name: Aussentemperatur 30°
      message: 'Sonnenaufgang {{ states(''sensor.aqara_climate_05_temperature'') | float(0) | round(1) }}°C, Sonnenuntergang {{ states(''sensor.tuya_climate_01_temperature'') | float(0) | round(1) }}°C'
      domain: automation
  mode: single

- id: 'notify_bedtime_kinder'
  alias: Notification » Bedtime Reminder Kinder
  description: 19 Uhr Critical Push wenn Apple TV läuft und morgen Arbeitstag ist
  mode: single
  triggers:
  - trigger: time
    at: "19:00:00"
  conditions:
  - condition: state
    entity_id: binary_sensor.tomorrow_workday_sensor
    state: 'on'
  - condition: or
    conditions:
    - condition: state
      entity_id: person.rafael
      state: 'home'
    - condition: state
      entity_id: person.alex
      state: 'home'
  - condition: or
    conditions:
    - condition: state
      entity_id: media_player.appletv
      state: 'playing'
    - condition: state
      entity_id: media_player.wohnzimmer
      state: 'playing'
  actions:
  - alias: "Reminder-Flag setzen"
    action: input_boolean.turn_on
    target:
      entity_id: input_boolean.bedtime_reminder_active
  - variables:
      notify_title: "Kinder ins Bett"
      notify_message: "Bett fertig machen, morgen ist Arbeitstag"
      notify_data:
        push:
          interruption-level: critical
          sound:
            name: default
            critical: 1
            volume: 1.0
        tag: "bedtime_kinder"
        actions:
        - action: "BEDTIME_DONE"
          title: "Schon im Bett"
          destructive: false
        - action: "BEDTIME_SNOOZE"
          title: "Noch 15 Min"
  - parallel:
    - if:
      - condition: state
        entity_id: person.rafael
        state: 'home'
      then:
      - action: notify.mobile_app_iphone_rafael
        data:
          title: "{{ notify_title }}"
          message: "{{ notify_message }}"
          data: "{{ notify_data }}"
    - if:
      - condition: state
        entity_id: person.alex
        state: 'home'
      then:
      - action: notify.mobile_app_alex_iphone
        data:
          title: "{{ notify_title }}"
          message: "{{ notify_message }}"
          data: "{{ notify_data }}"
  - delay: "00:15:00"
  - alias: "Nur Reminder wenn Flag noch aktiv (Button hat nicht abgeschaltet)"
    condition: state
    entity_id: input_boolean.bedtime_reminder_active
    state: 'on'
  - condition: or
    conditions:
    - condition: state
      entity_id: media_player.appletv
      state: 'playing'
    - condition: state
      entity_id: media_player.wohnzimmer
      state: 'playing'
  - variables:
      reminder_message: "Immer noch TV an, Kinder jetzt ins Bett"
  - parallel:
    - if:
      - condition: state
        entity_id: person.rafael
        state: 'home'
      then:
      - action: notify.mobile_app_iphone_rafael
        data:
          title: "{{ notify_title }}"
          message: "{{ reminder_message }}"
          data: "{{ notify_data }}"
    - if:
      - condition: state
        entity_id: person.alex
        state: 'home'
      then:
      - action: notify.mobile_app_alex_iphone
        data:
          title: "{{ notify_title }}"
          message: "{{ reminder_message }}"
          data: "{{ notify_data }}"
  - alias: "Reminder-Flag zuruecksetzen"
    action: input_boolean.turn_off
    target:
      entity_id: input_boolean.bedtime_reminder_active

- id: 'notify_bedtime_action_handler'
  alias: Notification » Bedtime Action Handler
  description: Verarbeitet iOS-Action-Buttons der Bedtime-Reminder-Notification
  mode: parallel
  max: 5
  triggers:
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: BEDTIME_DONE
    id: done
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: BEDTIME_SNOOZE
    id: snooze
  conditions: []
  actions:
  - choose:
    - alias: "User bestaetigt: Kinder sind im Bett"
      conditions:
      - condition: trigger
        id: done
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.bedtime_reminder_active
      - action: logbook.log
        data:
          name: "Bedtime Reminder"
          message: "Bestaetigt per Notification-Button"
          domain: automation
    - alias: "User will 15 Min Aufschub (Flag bleibt on, Delay laeuft)"
      conditions:
      - condition: trigger
        id: snooze
      sequence:
      - action: logbook.log
        data:
          name: "Bedtime Reminder"
          message: "Snooze per Notification-Button"
          domain: automation
