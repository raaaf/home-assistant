# Appliances - Air Quality
# Luftwäscher, Luftbefeuchter und zugehörige Benachrichtigungen

# ============================================================================
# Venta Luftwäscher (Wohnzimmer) — via Smart Plug
# ============================================================================

- id: 'luftwascher_wohnzimmer'
  alias: "Wohnzimmer » Luftwäscher"
  description: >-
    Steuert den Venta Luftwäscher über Smart Plug basierend auf Luftfeuchtigkeit
    mit Hysterese, Fenster-Guard und Presence-Trigger mit Retry.
  triggers:
  - trigger: numeric_state
    entity_id: sensor.wohnzimmer_luftfeuchtigkeit
    below: input_number.luftwascher_ziel_einschalten
    for:
      minutes: 5
    id: humidity-low
  - trigger: numeric_state
    entity_id: sensor.wohnzimmer_luftfeuchtigkeit
    above: input_number.luftwascher_ziel_ausschalten
    for:
      minutes: 5
    id: humidity-ok
  - trigger: state
    entity_id:
    - binary_sensor.wohnzimmer_kontaktsensor_contact
    - binary_sensor.balkon_kontaktsensor_contact
    - binary_sensor.kuche_kontaktsensor_contact
    to: 'on'
    for:
      minutes: 2
    id: window-open
  - trigger: state
    entity_id:
    - binary_sensor.wohnzimmer_kontaktsensor_contact
    - binary_sensor.balkon_kontaktsensor_contact
    - binary_sensor.kuche_kontaktsensor_contact
    to: 'off'
    for:
      minutes: 2
    id: window-closed
  - trigger: state
    entity_id: input_boolean.alle_sind_weg
    to: 'off'
    id: home
  - trigger: state
    entity_id: input_boolean.alle_sind_weg
    to: 'on'
    id: away
  conditions:
  - alias: "Smart Plug ist verfügbar"
    condition: template
    value_template: "{{ has_value('switch.steckdose_luftwascher') }}"
  actions:
  - choose:
    - alias: "Feuchtigkeit zu niedrig — einschalten"
      conditions:
      - condition: trigger
        id: humidity-low
      - alias: "Fenster geschlossen (WZ, Balkon, Küche)"
        condition: template
        value_template: >-
          {{ not is_state('binary_sensor.wohnzimmer_kontaktsensor_contact', 'on')
             and not is_state('binary_sensor.balkon_kontaktsensor_contact', 'on')
             and not is_state('binary_sensor.kuche_kontaktsensor_contact', 'on') }}
      - alias: "Jemand ist zu Hause"
        condition: state
        entity_id: input_boolean.alle_sind_weg
        state: 'off'
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.steckdose_luftwascher
      - delay:
          seconds: 5
      - alias: "Retry wenn Smart Plug nicht reagiert hat"
        if:
        - condition: state
          entity_id: switch.steckdose_luftwascher
          state: 'off'
        then:
        - action: switch.turn_on
          target:
            entity_id: switch.steckdose_luftwascher
      - action: logbook.log
        data:
          name: Luftwäscher
          message: "Eingeschaltet — Feuchtigkeit unter {{ states('input_number.luftwascher_ziel_einschalten') }}%"
          entity_id: switch.steckdose_luftwascher

    - alias: "Feuchtigkeit OK — ausschalten"
      conditions:
      - condition: trigger
        id: humidity-ok
      - alias: "Luftwäscher läuft"
        condition: state
        entity_id: switch.steckdose_luftwascher
        state: 'on'
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.steckdose_luftwascher
      - action: logbook.log
        data:
          name: Luftwäscher
          message: "Ausgeschaltet — Feuchtigkeit über {{ states('input_number.luftwascher_ziel_ausschalten') }}%"
          entity_id: switch.steckdose_luftwascher

    - alias: "Fenster offen — sofort ausschalten"
      conditions:
      - condition: trigger
        id: window-open
      - alias: "Luftwäscher läuft"
        condition: state
        entity_id: switch.steckdose_luftwascher
        state: 'on'
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.steckdose_luftwascher
      - action: logbook.log
        data:
          name: Luftwäscher
          message: "Ausgeschaltet — Fenster geöffnet"
          entity_id: switch.steckdose_luftwascher

    - alias: "Fenster geschlossen — einschalten wenn nötig"
      conditions:
      - condition: trigger
        id: window-closed
      - alias: "Alle relevanten Fenster geschlossen"
        condition: template
        value_template: >-
          {{ not is_state('binary_sensor.wohnzimmer_kontaktsensor_contact', 'on')
             and not is_state('binary_sensor.balkon_kontaktsensor_contact', 'on')
             and not is_state('binary_sensor.kuche_kontaktsensor_contact', 'on') }}
      - alias: "Jemand ist zu Hause"
        condition: state
        entity_id: input_boolean.alle_sind_weg
        state: 'off'
      - alias: "Feuchtigkeit noch unter Ausschaltschwelle"
        condition: numeric_state
        entity_id: sensor.wohnzimmer_luftfeuchtigkeit
        below: input_number.luftwascher_ziel_ausschalten
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.steckdose_luftwascher
      - delay:
          seconds: 5
      - if:
        - condition: state
          entity_id: switch.steckdose_luftwascher
          state: 'off'
        then:
        - action: switch.turn_on
          target:
            entity_id: switch.steckdose_luftwascher
      - action: logbook.log
        data:
          name: Luftwäscher
          message: "Eingeschaltet — Fenster geschlossen, Feuchtigkeit noch unter Ausschaltschwelle"
          entity_id: switch.steckdose_luftwascher

    - alias: "Jemand kommt heim — einschalten wenn Feuchtigkeit unter Ausschaltschwelle"
      conditions:
      - condition: trigger
        id: home
      - alias: "Fenster geschlossen"
        condition: template
        value_template: >-
          {{ not is_state('binary_sensor.wohnzimmer_kontaktsensor_contact', 'on')
             and not is_state('binary_sensor.balkon_kontaktsensor_contact', 'on')
             and not is_state('binary_sensor.kuche_kontaktsensor_contact', 'on') }}
      - alias: "Feuchtigkeit unter Ausschaltschwelle (Hysterese-Zone eingeschlossen)"
        condition: numeric_state
        entity_id: sensor.wohnzimmer_luftfeuchtigkeit
        below: input_number.luftwascher_ziel_ausschalten
      - alias: "Luftwäscher ist aus"
        condition: state
        entity_id: switch.steckdose_luftwascher
        state: 'off'
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.steckdose_luftwascher
      - delay:
          seconds: 5
      - if:
        - condition: state
          entity_id: switch.steckdose_luftwascher
          state: 'off'
        then:
        - action: switch.turn_on
          target:
            entity_id: switch.steckdose_luftwascher
      - action: logbook.log
        data:
          name: Luftwäscher
          message: "Eingeschaltet — Jemand kam nachhause, Feuchtigkeit niedrig"
          entity_id: switch.steckdose_luftwascher

    - alias: "Alle weg — ausschalten"
      conditions:
      - condition: trigger
        id: away
      - condition: state
        entity_id: switch.steckdose_luftwascher
        state: 'on'
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.steckdose_luftwascher
      - action: logbook.log
        data:
          name: Luftwäscher
          message: "Ausgeschaltet — Alle haben das Haus verlassen"
          entity_id: switch.steckdose_luftwascher
  mode: single
  max_exceeded: silent

# ============================================================================
# Venta Wassertank-Erkennung via Leistungsmessung
# ============================================================================

- id: 'luftwascher_wasser_leer'
  alias: "Benachrichtigung » Luftwäscher kein Wasser"
  description: >-
    Erkennt leeren Wassertank des Venta über niedrigen Stromverbrauch.
    Power muss 10 Min unter Schwelle bleiben (verhindert Fehlalarm bei Stufenwechsel).
  triggers:
  - trigger: numeric_state
    entity_id: sensor.steckdose_luftwascher_power
    below: input_number.luftwascher_leer_schwelle
    for:
      minutes: 10
  conditions:
  - alias: "Gerät soll laufen (Steckdose ist an)"
    condition: state
    entity_id: switch.steckdose_luftwascher
    state: 'on'
  - alias: "Steckdose seit > 2 Min an (Anlaufzeit ignorieren)"
    condition: template
    value_template: >-
      {{ as_timestamp(now()) - as_timestamp(states.switch.steckdose_luftwascher.last_changed) > 120 }}
  - alias: "Letzte Notification > 12h her"
    condition: template
    value_template: >-
      {% set last = state_attr('automation.benachrichtigung_luftwascher_kein_wasser', 'last_triggered') %}
      {{ last is none or (now() - last).total_seconds() > 12 * 60 * 60 }}
  actions:
  - action: persistent_notification.create
    data:
      title: "Luftwäscher — Kein Wasser"
      message: "Der Venta Luftwäscher im Wohnzimmer hat vermutlich kein Wasser mehr. Bitte Wassertank auffüllen."
      notification_id: luftwascher_kein_wasser
  - alias: "Push nur wenn nicht Schlafenszeit"
    condition: and
    conditions:
    - condition: state
      entity_id: input_boolean.schlafenszeit
      state: 'off'
    - condition: time
      after: '08:00:00'
      before: '22:00:00'
  - action: notify.rafael
    data:
      title: "Luftwäscher — Kein Wasser"
      message: "Venta im Wohnzimmer hat kein Wasser mehr. Bitte auffüllen."
  - alias: "Gerät ausschalten (Trockenlauf vermeiden)"
    action: switch.turn_off
    target:
      entity_id: switch.steckdose_luftwascher
  mode: single
  max_exceeded: silent

# ============================================================================
# Smartmi Rainforest Luftbefeuchter (Schlafzimmer)
# ============================================================================

- id: 'smartmi_rainforest_steuerung'
  alias: "Schlafzimmer » Smartmi Luftbefeuchter"
  description: >-
    Steuert den Smartmi Rainforest basierend auf Schlafzimmer-Luftfeuchtigkeit
    mit Hysterese, Fenster-Guard und Presence-Trigger mit Retry.
  triggers:
  - trigger: numeric_state
    entity_id: sensor.schlafzimmer_temperatur_und_luftfeuchtigkeit_humidity
    below: input_number.smartmi_ziel_einschalten
    for:
      minutes: 5
    id: humidity-low
  - trigger: numeric_state
    entity_id: sensor.schlafzimmer_temperatur_und_luftfeuchtigkeit_humidity
    above: input_number.smartmi_ziel_ausschalten
    for:
      minutes: 5
    id: humidity-ok
  - trigger: state
    entity_id:
    - binary_sensor.schlafzimmer_kontaktsensor_contact
    - binary_sensor.arbeitszimmer_kontaktsensor_contact
    to: 'on'
    for:
      minutes: 2
    id: window-open
  - trigger: state
    entity_id:
    - binary_sensor.schlafzimmer_kontaktsensor_contact
    - binary_sensor.arbeitszimmer_kontaktsensor_contact
    to: 'off'
    for:
      minutes: 2
    id: window-closed
  - trigger: state
    entity_id: input_boolean.alle_sind_weg
    to: 'off'
    id: home
  - trigger: state
    entity_id: input_boolean.alle_sind_weg
    to: 'on'
    id: away
  conditions:
  - alias: "Smartmi ist verfügbar"
    condition: template
    value_template: "{{ has_value('humidifier.smartmi_humidifier_rainforest_hum_dehum') }}"
  actions:
  - choose:
    - alias: "Feuchtigkeit zu niedrig — einschalten"
      conditions:
      - condition: trigger
        id: humidity-low
      - alias: "Alle Fenster geschlossen (unknown = geschlossen nach Neustart)"
        condition: template
        value_template: >-
          {{ not is_state('binary_sensor.schlafzimmer_kontaktsensor_contact', 'on')
             and not is_state('binary_sensor.arbeitszimmer_kontaktsensor_contact', 'on') }}
      - alias: "Jemand ist zu Hause"
        condition: state
        entity_id: input_boolean.alle_sind_weg
        state: 'off'
      sequence:
      - action: humidifier.turn_on
        target:
          entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum
      - delay:
          seconds: 10
      - alias: "Retry wenn Smartmi nicht reagiert hat"
        if:
        - condition: state
          entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum
          state: 'off'
        then:
        - action: humidifier.turn_on
          target:
            entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum
        - delay:
            seconds: 10
        - if:
          - condition: state
            entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum
            state: 'off'
          then:
          - action: humidifier.turn_on
            target:
              entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum

    - alias: "Feuchtigkeit OK — ausschalten"
      conditions:
      - condition: trigger
        id: humidity-ok
      - alias: "Smartmi läuft"
        condition: state
        entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum
        state: 'on'
      sequence:
      - action: humidifier.turn_off
        target:
          entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum

    - alias: "Fenster offen — ausschalten"
      conditions:
      - condition: trigger
        id: window-open
      - alias: "Smartmi läuft"
        condition: state
        entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum
        state: 'on'
      sequence:
      - action: humidifier.turn_off
        target:
          entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum

    - alias: "Fenster geschlossen — einschalten wenn nötig"
      conditions:
      - condition: trigger
        id: window-closed
      - alias: "Beide Fenster geschlossen (unknown = geschlossen nach Neustart)"
        condition: template
        value_template: >-
          {{ not is_state('binary_sensor.schlafzimmer_kontaktsensor_contact', 'on')
             and not is_state('binary_sensor.arbeitszimmer_kontaktsensor_contact', 'on') }}
      - alias: "Jemand ist zu Hause"
        condition: state
        entity_id: input_boolean.alle_sind_weg
        state: 'off'
      - alias: "Feuchtigkeit noch unter Ausschaltschwelle"
        condition: numeric_state
        entity_id: sensor.schlafzimmer_temperatur_und_luftfeuchtigkeit_humidity
        below: input_number.smartmi_ziel_ausschalten
      sequence:
      - action: humidifier.turn_on
        target:
          entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum
      - delay:
          seconds: 10
      - if:
        - condition: state
          entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum
          state: 'off'
        then:
        - action: humidifier.turn_on
          target:
            entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum

    - alias: "Jemand kommt heim — einschalten wenn Feuchtigkeit niedrig"
      conditions:
      - condition: trigger
        id: home
      - alias: "Fenster geschlossen (unknown = geschlossen nach Neustart)"
        condition: template
        value_template: >-
          {{ not is_state('binary_sensor.schlafzimmer_kontaktsensor_contact', 'on')
             and not is_state('binary_sensor.arbeitszimmer_kontaktsensor_contact', 'on') }}
      - alias: "Feuchtigkeit unter Ausschaltschwelle (Hysterese-Zone eingeschlossen)"
        condition: numeric_state
        entity_id: sensor.schlafzimmer_temperatur_und_luftfeuchtigkeit_humidity
        below: input_number.smartmi_ziel_ausschalten
      - alias: "Smartmi ist aus"
        condition: state
        entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum
        state: 'off'
      sequence:
      - action: humidifier.turn_on
        target:
          entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum
      - delay:
          seconds: 10
      - alias: "Retry 1"
        if:
        - condition: state
          entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum
          state: 'off'
        then:
        - action: humidifier.turn_on
          target:
            entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum
        - delay:
            seconds: 10
        - alias: "Retry 2"
          if:
          - condition: state
            entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum
            state: 'off'
          then:
          - action: humidifier.turn_on
            target:
              entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum
      - action: logbook.log
        data:
          name: Smartmi
          message: "Eingeschaltet — Jemand kam nachhause, Feuchtigkeit niedrig"
          entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum

    - alias: "Alle weg — ausschalten"
      conditions:
      - condition: trigger
        id: away
      - condition: state
        entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum
        state: 'on'
      sequence:
      - action: humidifier.turn_off
        target:
          entity_id: humidifier.smartmi_humidifier_rainforest_hum_dehum
  mode: single
  max_exceeded: silent

# ============================================================================
# Smartmi Wassertank leer
# ============================================================================

- id: 'smartmi_rainforest_wasser_leer'
  alias: "Benachrichtigung » Smartmi kein Wasser"
  description: "Benachrichtigt wenn der Smartmi Rainforest Wassertank fast leer ist."
  triggers:
  - trigger: numeric_state
    entity_id: sensor.smartmi_humidifier_rainforest_water_level
    below: 16
    for:
      minutes: 2
  conditions:
  - alias: "Letzte Notification > 12h her"
    condition: template
    value_template: >-
      {% set last = state_attr('automation.benachrichtigung_smartmi_kein_wasser', 'last_triggered') %}
      {{ last is none or (now() - last).total_seconds() > 12 * 60 * 60 }}
  actions:
  - action: persistent_notification.create
    data:
      title: "Smartmi Rainforest — Kein Wasser"
      message: "Der Smartmi Luftbefeuchter im Schlafzimmer hat kaum noch Wasser. Bitte Wassertank auffüllen."
      notification_id: smartmi_kein_wasser
  - alias: "Push nur wenn nicht Schlafenszeit"
    condition: and
    conditions:
    - condition: state
      entity_id: input_boolean.schlafenszeit
      state: 'off'
    - condition: time
      after: '08:00:00'
      before: '22:00:00'
  - action: notify.rafael
    data:
      title: "Smartmi Rainforest — Kein Wasser"
      message: "Smartmi im Schlafzimmer hat kaum noch Wasser. Bitte auffüllen."
  mode: single
  max_exceeded: silent
