# Areas - Kinderzimmer.Yaml
# Generated by automation splitter - 4 automations
# Part of Home Assistant configuration

- id: '1692710690350'
  alias: Motion » Kinderzimmer
  description: Bewegungsgesteuerte Beleuchtung im Kinderzimmer mit Nachtlicht-Modus
    und Helligkeitssensor
  use_blueprint:
    path: Blackshome/sensor-light.yaml
    input:
      motion_trigger:
      - binary_sensor.tuya_motion_02_presence
      light_switch:
        entity_id: light.alle_kinderzimmer_lichter
      include_ambient: ambient_enabled
      ambient_light_sensor: sensor.balkon_motion_illuminance_safe
      include_night_lights: night_lights_enabled
      night_lights:
        entity_id: light.alle_kinderzimmer_nachtlichter
      include_light_control:
      - use_brightness
      - use_transition
      light_transition_on: 2
      light_transition_off: 10
      include_night_light_control:
      - use_night_brightness
      - use_brightness
      - use_transition
      night_light_transition_on: 2
      night_light_transition_off: 10
      night_lights_after_time: '19:00:00'
      night_lights_before_time: 05:30:00
      time_delay: 0
      night_time_delay: 0
      night_lights_conditions:
      - entity_state_enabled
      night_lights_entity_state:
      - input_boolean.schlafenszeit
      include_sun: sun_disabled
      night_light_brightness: 5
      ambient_light_value: 300
      ambient_light_high_value: 400
      # Bypass motion turn-off when manual control is active
      include_bypass:
      - bypass_enabled_stop
      motion_bypass_lights_stop:
      - binary_sensor.kinderzimmer_manual_control
- id: '1722519561150'
  alias: Helper » Dynamische Kinder-Schlafzeiten
  description: 'Berechnet täglich optimale Schlafzeiten für Kinder basierend auf:
    - Jahreszeit und Monat - Sonnenuntergang - Wetter und Helligkeit - Temperatur

    '
  triggers:
  - at: 00:10:00
    trigger: time
  conditions: []
  actions:
  - variables:
      basis_einschlaf_schultag: '20:00:00'
      basis_einschlaf_wochenende: '21:00:00'
      basis_aufwach_schultag: 06:30:00
      basis_aufwach_wochenende: 07:30:00
      aktueller_monat: '{{ now().month | int }}'
      aussentemperatur: '{% if has_value(''weather.fuerth_bayern'') %}{{ state_attr(''weather.fuerth_bayern'', ''temperature'')
        | float(20) }}{% else %}20{% endif %}'
      helligkeit_draussen: '{% if has_value(''sensor.ikea_motion_03_illuminance'') %}{{ states(''sensor.ikea_motion_03_illuminance'') | float(100)
        }}{% else %}100{% endif %}'
      wetter: '{% if has_value(''weather.fuerth_bayern'') %}{{ states(''weather.fuerth_bayern'') }}{% else %}sunny{% endif %}'
      sonnenuntergang_zeit: "{% set su = state_attr('sun.sun', 'next_setting') %}\
        \ {% if su %}\n  {{ (su | as_datetime | as_local).strftime('%H:%M') }}\n{%\
        \ else %}\n  20:00\n{% endif %}\n"
      # Saison-Offset: Im Sommer (Jun-Aug) 30min spaeter einschlafen, im Winter (Nov-Feb) 15min frueher aufwachen
      saison_offset_einschlaf: >-
        {% if aktueller_monat | int in [6, 7, 8] %}30
        {% elif aktueller_monat | int in [11, 12, 1, 2] %}-15
        {% else %}0{% endif %}
      saison_offset_aufwach: >-
        {% if aktueller_monat | int in [11, 12, 1, 2] %}-15
        {% else %}0{% endif %}
      # Sonnenuntergang-Offset: Wenn Sonnenuntergang nach 20:30, 15min spaeter einschlafen
      sonnenuntergang_offset: >-
        {% set su = state_attr('sun.sun', 'next_setting') %}
        {% if su %}
          {% set su_hour = (su | as_datetime | as_local).hour %}
          {% set su_min = (su | as_datetime | as_local).minute %}
          {{ 15 if (su_hour > 20 or (su_hour == 20 and su_min >= 30)) else 0 }}
        {% else %}0{% endif %}
      # Temperatur-Offset: Bei Hitze (>28°C) 15min spaeter einschlafen (Kinder schlafen schwerer ein)
      temp_offset: >-
        {{ 15 if aussentemperatur | float(20) > 28 else 0 }}
      # Gesamt-Offsets berechnen (in Minuten)
      gesamt_offset_einschlaf: >-
        {{ (saison_offset_einschlaf | int(0)) + (sonnenuntergang_offset | int(0)) + (temp_offset | int(0)) }}
      gesamt_offset_aufwach: >-
        {{ saison_offset_aufwach | int(0) }}
      # Finale Zeiten berechnen
      einschlaf_schultag_final: >-
        {% set base = today_at(basis_einschlaf_schultag) %}
        {{ (base + timedelta(minutes=gesamt_offset_einschlaf | int(0))).strftime('%H:%M:%S') }}
      einschlaf_wochenende_final: >-
        {% set base = today_at(basis_einschlaf_wochenende) %}
        {{ (base + timedelta(minutes=gesamt_offset_einschlaf | int(0))).strftime('%H:%M:%S') }}
      aufwach_schultag_final: >-
        {% set base = today_at(basis_aufwach_schultag) %}
        {{ (base + timedelta(minutes=gesamt_offset_aufwach | int(0))).strftime('%H:%M:%S') }}
      aufwach_wochenende_final: >-
        {% set base = today_at(basis_aufwach_wochenende) %}
        {{ (base + timedelta(minutes=gesamt_offset_aufwach | int(0))).strftime('%H:%M:%S') }}
  - action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.einschlafzeit_arbeitstag
    data:
      time: '{{ einschlaf_schultag_final }}'
  - action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.einschlafzeit_freier_tag
    data:
      time: '{{ einschlaf_wochenende_final }}'
  - action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.aufwachzeit_arbeitstag
    data:
      time: '{{ aufwach_schultag_final }}'
  - action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.aufwachzeit_freier_tag
    data:
      time: '{{ aufwach_wochenende_final }}'
  - action: logbook.log
    data:
      name: Schlafenszeiten angepasst
      message: 'Schultage: schlafen {{ einschlaf_schultag_final[:5] }} / aufstehen
        {{ aufwach_schultag_final[:5] }} - Wochenende: schlafen {{ einschlaf_wochenende_final[:5]
        }} / aufstehen {{ aufwach_wochenende_final[:5] }}'
      domain: automation
  mode: single
- id: 'kinderzimmer_motion_schlafenszeit'
  alias: Helper » Kinderzimmer Motion bei Schlafenszeit
  description: Deaktiviert Bewegungsmelder während Schlafenszeit
  triggers:
  - trigger: state
    entity_id: input_boolean.schlafenszeit
    to: 'on'
    id: sleep_start
  - trigger: state
    entity_id: input_boolean.schlafenszeit
    to: 'off'
    id: sleep_end
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: sleep_start
      sequence:
      - action: automation.turn_off
        target:
          entity_id: automation.kinderzimmer_motion
        data:
          stop_actions: true
    - conditions:
      - condition: trigger
        id: sleep_end
      sequence:
      - action: automation.turn_on
        target:
          entity_id: automation.kinderzimmer_motion
  mode: single
