# Areas - Schlafzimmer.Yaml
# Generated by automation splitter - 3 automations
# Part of Home Assistant configuration

- id: '1652698714339'
  alias: Schlafzimmer » Luftreiniger
  description: >-
    Steuert den Xiaomi Air Purifier 4 Pro basierend auf PM2.5-Werten und
    Luftfeuchtigkeit mit Fenster-Guard, Away-Modus und Sleep/Auto-Preset.
  triggers:
  - trigger: numeric_state
    entity_id: sensor.zhimi_vb4_bce4_pm25_density
    above: 20
    for:
      minutes: 1
    id: pm25-high
  - trigger: numeric_state
    entity_id: sensor.zhimi_vb4_bce4_pm25_density
    below: 10
    for:
      minutes: 5
    id: pm25-low
  - trigger: numeric_state
    entity_id: sensor.zhimi_vb4_bce4_relative_humidity
    above: 65
    for:
      minutes: 5
    id: humidity-high
  - trigger: state
    entity_id:
    - binary_sensor.schlafzimmer_kontaktsensor_contact
    - binary_sensor.arbeitszimmer_kontaktsensor_contact
    to: 'on'
    for:
      minutes: 2
    id: window-open
  - trigger: state
    entity_id:
    - binary_sensor.schlafzimmer_kontaktsensor_contact
    - binary_sensor.arbeitszimmer_kontaktsensor_contact
    to: 'off'
    for:
      minutes: 2
    id: window-closed
  - trigger: state
    entity_id: input_boolean.alle_sind_weg
    to: 'on'
    id: away
  - trigger: state
    entity_id: input_boolean.alle_sind_weg
    to: 'off'
    id: home
  - trigger: state
    entity_id: input_boolean.schlafenszeit
    to: 'on'
    id: sleep_start
  - trigger: state
    entity_id: input_boolean.schlafenszeit
    to: 'off'
    id: sleep_end
  conditions:
  - alias: "Luftreiniger ist verfügbar"
    condition: template
    value_template: "{{ has_value('fan.zhimi_vb4_bce4_air_purifier') }}"
  actions:
  - choose:
    - alias: "PM2.5 hoch — einschalten"
      conditions:
      - condition: trigger
        id: pm25-high
      - alias: "Luftreiniger läuft nicht"
        condition: state
        entity_id: fan.zhimi_vb4_bce4_air_purifier
        state: 'off'
      - alias: "Jemand ist zu Hause"
        condition: state
        entity_id: input_boolean.alle_sind_weg
        state: 'off'
      - alias: "Fenster geschlossen"
        condition: state
        entity_id: binary_sensor.schlafzimmer_kontaktsensor_contact
        state: 'off'
      - condition: state
        entity_id: binary_sensor.arbeitszimmer_kontaktsensor_contact
        state: 'off'
      - alias: "Sensor verfügbar"
        condition: template
        value_template: "{{ has_value('sensor.zhimi_vb4_bce4_pm25_density') }}"
      sequence:
      - action: fan.turn_on
        target:
          entity_id: fan.zhimi_vb4_bce4_air_purifier
      - alias: "Passenden Modus setzen"
        choose:
        - conditions:
          - condition: state
            entity_id: input_boolean.schlafenszeit
            state: 'on'
          sequence:
          - condition: template
            value_template: "{{ state_attr('fan.zhimi_vb4_bce4_air_purifier', 'preset_mode') != 'Sleep' }}"
          - action: fan.set_preset_mode
            target:
              entity_id: fan.zhimi_vb4_bce4_air_purifier
            data:
              preset_mode: Sleep
        default:
        - condition: template
          value_template: "{{ state_attr('fan.zhimi_vb4_bce4_air_purifier', 'preset_mode') != 'Auto' }}"
        - action: fan.set_preset_mode
          target:
            entity_id: fan.zhimi_vb4_bce4_air_purifier
          data:
            preset_mode: Auto

    - alias: "Feuchtigkeit hoch — einschalten"
      conditions:
      - condition: trigger
        id: humidity-high
      - condition: state
        entity_id: fan.zhimi_vb4_bce4_air_purifier
        state: 'off'
      - condition: state
        entity_id: input_boolean.alle_sind_weg
        state: 'off'
      - condition: state
        entity_id: binary_sensor.schlafzimmer_kontaktsensor_contact
        state: 'off'
      - condition: state
        entity_id: binary_sensor.arbeitszimmer_kontaktsensor_contact
        state: 'off'
      sequence:
      - action: fan.turn_on
        target:
          entity_id: fan.zhimi_vb4_bce4_air_purifier
      - choose:
        - conditions:
          - condition: state
            entity_id: input_boolean.schlafenszeit
            state: 'on'
          sequence:
          - condition: template
            value_template: "{{ state_attr('fan.zhimi_vb4_bce4_air_purifier', 'preset_mode') != 'Sleep' }}"
          - action: fan.set_preset_mode
            target:
              entity_id: fan.zhimi_vb4_bce4_air_purifier
            data:
              preset_mode: Sleep
        default:
        - condition: template
          value_template: "{{ state_attr('fan.zhimi_vb4_bce4_air_purifier', 'preset_mode') != 'Auto' }}"
        - action: fan.set_preset_mode
          target:
            entity_id: fan.zhimi_vb4_bce4_air_purifier
          data:
            preset_mode: Auto

    - alias: "PM2.5 gut — ausschalten"
      conditions:
      - condition: trigger
        id: pm25-low
      - condition: state
        entity_id: fan.zhimi_vb4_bce4_air_purifier
        state: 'on'
      - alias: "Nicht ausschalten wenn Schlafenszeit aktiv und jemand zu Hause"
        condition: or
        conditions:
        - condition: state
          entity_id: input_boolean.schlafenszeit
          state: 'off'
        - condition: state
          entity_id: input_boolean.alle_sind_weg
          state: 'on'
      - alias: "Feuchtigkeit auch OK"
        condition: or
        conditions:
        - condition: numeric_state
          entity_id: sensor.zhimi_vb4_bce4_relative_humidity
          below: 65
        - condition: template
          value_template: "{{ not has_value('sensor.zhimi_vb4_bce4_relative_humidity') }}"
      sequence:
      - action: fan.turn_off
        target:
          entity_id: fan.zhimi_vb4_bce4_air_purifier

    - alias: "Fenster offen — ausschalten"
      conditions:
      - condition: trigger
        id: window-open
      - condition: state
        entity_id: fan.zhimi_vb4_bce4_air_purifier
        state: 'on'
      sequence:
      - action: fan.turn_off
        target:
          entity_id: fan.zhimi_vb4_bce4_air_purifier

    - alias: "Fenster geschlossen — einschalten wenn PM2.5 hoch"
      conditions:
      - condition: trigger
        id: window-closed
      - alias: "Beide Fenster geschlossen"
        condition: state
        entity_id: binary_sensor.schlafzimmer_kontaktsensor_contact
        state: 'off'
      - condition: state
        entity_id: binary_sensor.arbeitszimmer_kontaktsensor_contact
        state: 'off'
      - condition: state
        entity_id: fan.zhimi_vb4_bce4_air_purifier
        state: 'off'
      - condition: state
        entity_id: input_boolean.alle_sind_weg
        state: 'off'
      - alias: "PM2.5 oder Feuchtigkeit problematisch"
        condition: or
        conditions:
        - condition: numeric_state
          entity_id: sensor.zhimi_vb4_bce4_pm25_density
          above: 20
        - condition: numeric_state
          entity_id: sensor.zhimi_vb4_bce4_relative_humidity
          above: 65
      sequence:
      - action: fan.turn_on
        target:
          entity_id: fan.zhimi_vb4_bce4_air_purifier
      - choose:
        - conditions:
          - condition: state
            entity_id: input_boolean.schlafenszeit
            state: 'on'
          sequence:
          - condition: template
            value_template: "{{ state_attr('fan.zhimi_vb4_bce4_air_purifier', 'preset_mode') != 'Sleep' }}"
          - action: fan.set_preset_mode
            target:
              entity_id: fan.zhimi_vb4_bce4_air_purifier
            data:
              preset_mode: Sleep
        default:
        - condition: template
          value_template: "{{ state_attr('fan.zhimi_vb4_bce4_air_purifier', 'preset_mode') != 'Auto' }}"
        - action: fan.set_preset_mode
          target:
            entity_id: fan.zhimi_vb4_bce4_air_purifier
          data:
            preset_mode: Auto

    - alias: "Alle weg — ausschalten"
      conditions:
      - condition: trigger
        id: away
      - condition: state
        entity_id: fan.zhimi_vb4_bce4_air_purifier
        state: 'on'
      sequence:
      - action: fan.turn_off
        target:
          entity_id: fan.zhimi_vb4_bce4_air_purifier

    - alias: "Jemand kommt heim — einschalten wenn PM2.5 hoch"
      conditions:
      - condition: trigger
        id: home
      - condition: state
        entity_id: fan.zhimi_vb4_bce4_air_purifier
        state: 'off'
      - condition: template
        value_template: "{{ has_value('sensor.zhimi_vb4_bce4_pm25_density') }}"
      - condition: numeric_state
        entity_id: sensor.zhimi_vb4_bce4_pm25_density
        above: 20
      - condition: state
        entity_id: binary_sensor.schlafzimmer_kontaktsensor_contact
        state: 'off'
      - condition: state
        entity_id: binary_sensor.arbeitszimmer_kontaktsensor_contact
        state: 'off'
      sequence:
      - action: fan.turn_on
        target:
          entity_id: fan.zhimi_vb4_bce4_air_purifier
      - choose:
        - conditions:
          - condition: state
            entity_id: input_boolean.schlafenszeit
            state: 'on'
          sequence:
          - condition: template
            value_template: "{{ state_attr('fan.zhimi_vb4_bce4_air_purifier', 'preset_mode') != 'Sleep' }}"
          - action: fan.set_preset_mode
            target:
              entity_id: fan.zhimi_vb4_bce4_air_purifier
            data:
              preset_mode: Sleep
        default:
        - condition: template
          value_template: "{{ state_attr('fan.zhimi_vb4_bce4_air_purifier', 'preset_mode') != 'Auto' }}"
        - action: fan.set_preset_mode
          target:
            entity_id: fan.zhimi_vb4_bce4_air_purifier
          data:
            preset_mode: Auto

    - alias: "Schlafenszeit — Sleep-Preset setzen"
      conditions:
      - condition: trigger
        id: sleep_start
      - condition: state
        entity_id: input_boolean.alle_sind_weg
        state: 'off'
      sequence:
      - alias: "Einschalten wenn aus"
        action: fan.turn_on
        target:
          entity_id: fan.zhimi_vb4_bce4_air_purifier
      - condition: template
        value_template: "{{ state_attr('fan.zhimi_vb4_bce4_air_purifier', 'preset_mode') != 'Sleep' }}"
      - action: fan.set_preset_mode
        target:
          entity_id: fan.zhimi_vb4_bce4_air_purifier
        data:
          preset_mode: Sleep

    - alias: "Schlafenszeit beendet — ausschalten wenn Luft gut, sonst Auto"
      conditions:
      - condition: trigger
        id: sleep_end
      - condition: state
        entity_id: fan.zhimi_vb4_bce4_air_purifier
        state: 'on'
      sequence:
      - choose:
        - alias: "Luft ist gut — ausschalten"
          conditions:
          - condition: template
            value_template: "{{ has_value('sensor.zhimi_vb4_bce4_pm25_density') }}"
          - condition: numeric_state
            entity_id: sensor.zhimi_vb4_bce4_pm25_density
            below: 10
          sequence:
          - action: fan.turn_off
            target:
              entity_id: fan.zhimi_vb4_bce4_air_purifier
        default:
        - alias: "Luft nicht perfekt — auf Auto umschalten"
          condition: template
          value_template: "{{ state_attr('fan.zhimi_vb4_bce4_air_purifier', 'preset_mode') != 'Auto' }}"
        - action: fan.set_preset_mode
          target:
            entity_id: fan.zhimi_vb4_bce4_air_purifier
          data:
            preset_mode: Auto
  mode: single
  max_exceeded: silent

- id: 'luftreiniger_filter_warnung'
  alias: "Benachrichtigung » Luftreiniger Filter"
  description: "Warnt wenn der Filterstand des Xiaomi Air Purifier unter 15% fällt."
  triggers:
  - trigger: numeric_state
    entity_id: sensor.zhimi_vb4_bce4_filter_life_level
    below: 15
    for:
      hours: 1
  conditions:
  - alias: "Nicht Schlafenszeit"
    condition: state
    entity_id: input_boolean.schlafenszeit
    state: 'off'
  - condition: time
    after: '08:00:00'
    before: '22:00:00'
  - alias: "Letzte Notification > 24h her"
    condition: template
    value_template: >-
      {% set last = state_attr('automation.benachrichtigung_luftreiniger_filter', 'last_triggered') %}
      {{ last is none or (now() - last).total_seconds() > 24 * 60 * 60 }}
  actions:
  - action: notify.rafael
    data:
      title: "Luftreiniger — Filter wechseln"
      message: "Filterstand bei {{ states('sensor.zhimi_vb4_bce4_filter_life_level') }}%. Bitte Filter bestellen/wechseln."
  - action: persistent_notification.create
    data:
      title: "Luftreiniger — Filter wechseln"
      message: "Der Filter des Xiaomi Air Purifier im Schlafzimmer ist bei {{ states('sensor.zhimi_vb4_bce4_filter_life_level') }}%. Bitte zeitnah ersetzen."
      notification_id: luftreiniger_filter
  mode: single
  max_exceeded: silent
- id: '1678724233791'
  alias: Motion » Schlafzimmer
  description: Bewegungsgesteuerte Beleuchtung im Schlafzimmer mit Nachtlicht-Modus
    und Anwesenheitserkennung
  use_blueprint:
    path: Blackshome/sensor-light.yaml
    input:
      motion_trigger:
      - binary_sensor.schlafzimmer_motion_occupancy
      light_switch:
        entity_id: light.alle_schlafzimmer_lichter
      include_night_lights: night_lights_enabled
      night_lights:
        entity_id: light.alle_schlafzimmer_nachtlichter
      night_lights_conditions:
      - entity_state_enabled
      night_lights_entity_state:
      - input_boolean.schlafenszeit
      include_light_control:
      - use_brightness
      - use_transition
      light_transition_on: 2
      light_transition_off: 10
      include_sun: sun_disabled
      time_delay: 0
      night_time_delay: 0
      include_night_light_control:
      - if_lights_are_on_adjust_when_crossing_over
      - use_brightness
      - use_transition
      night_light_transition_on: 2
      night_light_transition_off: 10
      night_lights_after_time: '19:00:00'
      night_lights_before_time: 05:30:00
      include_ambient: ambient_enabled
      ambient_light_sensor: sensor.balkon_motion_illuminance_safe
      ambient_light_value: 300
      ambient_light_high_value: 400
      # Bypass motion turn-off when manual control is active
      include_bypass:
      - bypass_enabled_stop
      motion_bypass_lights_stop:
      - binary_sensor.schlafzimmer_manual_control
- id: '1737544939682'
  alias: Helper » Steckdose Arbeitszimmer
  description: 'Schaltet Arbeitszimmer-Steckdose automatisch ein,
    wenn sie wieder verfügbar ist – aber nur wenn jemand zu Hause ist.

    '
  trigger:
  - entity_id: switch.arbeitszimmer_steckdose
    from: unavailable
    trigger: state
  condition:
  - condition: state
    entity_id: input_boolean.alle_sind_weg
    state: 'off'
  action:
  - condition: state
    entity_id: switch.arbeitszimmer_steckdose
    state: 'off'
  - target:
      entity_id: switch.arbeitszimmer_steckdose
    action: switch.turn_on
  mode: single
- id: 'schlafzimmer_appletv_ambilight'
  alias: 'Licht » Schlafzimmer TV Ambilight'
  description: Schaltet Ambilight ein wenn Apple TV abspielt, deaktiviert Motion-Automation
  triggers:
  - trigger: state
    entity_id: media_player.appletv
    to: playing
    id: playing
  - trigger: state
    entity_id: media_player.appletv
    from: playing
    id: stopped
  - trigger: time_pattern
    minutes: "/5"
    id: poll-check
  conditions:
  - condition: or
    conditions:
    - condition: and
      conditions:
      - condition: trigger
        id:
        - playing
        - stopped
      - condition: template
        value_template: "{{ has_value('media_player.appletv') }}"
    - condition: and
      conditions:
      - condition: template
        value_template: "{{ is_state('media_player.appletv', 'playing') and has_value('media_player.appletv') }}"
      - condition: state
        entity_id: automation.motion_schlafzimmer
        state: 'on'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - playing
        - poll-check
      sequence:
      - action: automation.turn_off
        target:
          entity_id: automation.motion_schlafzimmer
        data:
          stop_actions: true
      - action: switch.turn_off
        target:
          entity_id: switch.adaptive_lighting_adapt_brightness_schlafzimmer
      - delay:
          milliseconds: 300
      - action: light.turn_off
        target:
          entity_id: light.alle_schlafzimmer_lichter
      - delay:
          milliseconds: 500
      - action: light.turn_on
        target:
          entity_id: light.schlafzimmer_tv
        data:
          brightness_pct: 30
      - delay:
          milliseconds: 500
      - action: adaptive_lighting.apply
        data:
          entity_id: switch.adaptive_lighting_schlafzimmer
          lights:
          - light.schlafzimmer_tv
          adapt_brightness: false
          adapt_color: true
    - conditions:
      - condition: trigger
        id: stopped
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.schlafzimmer_tv
      - action: switch.turn_on
        target:
          entity_id: switch.adaptive_lighting_adapt_brightness_schlafzimmer
      - action: automation.turn_on
        target:
          entity_id: automation.motion_schlafzimmer
  mode: restart
