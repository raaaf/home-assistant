# Areas - Schlafzimmer.Yaml
# Generated by automation splitter - 2 automations
# Part of Home Assistant configuration

- id: '1678724233791'
  alias: Motion » Schlafzimmer
  description: Bewegungsgesteuerte Beleuchtung im Schlafzimmer mit Nachtlicht-Modus
    und Anwesenheitserkennung
  use_blueprint:
    path: Blackshome/sensor-light.yaml
    input:
      motion_trigger:
      - binary_sensor.ikea_motion_09
      light_switch:
        entity_id: light.alle_schlafzimmer_lichter
      include_night_lights: night_lights_enabled
      night_lights:
        entity_id: light.alle_schlafzimmer_nachtlichter
      night_lights_conditions:
      - entity_state_enabled
      night_lights_entity_state:
      - input_boolean.schlafenszeit
      include_light_control:
      - use_brightness
      - use_transition
      light_transition_on: 2
      light_transition_off: 10
      include_sun: sun_disabled
      time_delay: 0
      night_time_delay: 0
      include_night_light_control:
      - if_lights_are_on_adjust_when_crossing_over
      - use_brightness
      - use_transition
      night_light_transition_on: 2
      night_light_transition_off: 10
      night_lights_after_time: '19:00:00'
      night_lights_before_time: 05:30:00
      include_ambient: ambient_enabled
      ambient_light_sensor: sensor.balkon_motion_illuminance_safe
      ambient_light_value: 300
      ambient_light_high_value: 400
      # Bypass motion turn-off when manual control is active
      include_bypass:
      - bypass_enabled_stop
      motion_bypass_lights_stop:
      - binary_sensor.schlafzimmer_manual_control
- id: 'schlafzimmer_appletv_ambilight'
  alias: 'Licht » Schlafzimmer TV Ambilight'
  description: Schaltet Ambilight ein wenn Apple TV abspielt, deaktiviert Motion-Automation
  triggers:
  - trigger: state
    entity_id: media_player.appletv
    to: playing
    id: playing
  - trigger: state
    entity_id: media_player.appletv
    from: playing
    id: stopped
  - trigger: time_pattern
    minutes: "/5"
    id: poll-check
  conditions:
  - condition: or
    conditions:
    - condition: and
      conditions:
      - condition: trigger
        id:
        - playing
        - stopped
      - condition: template
        value_template: "{{ has_value('media_player.appletv') }}"
    - condition: and
      conditions:
      - condition: template
        value_template: "{{ is_state('media_player.appletv', 'playing') and has_value('media_player.appletv') }}"
      - condition: state
        entity_id: automation.motion_schlafzimmer
        state: 'on'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - playing
        - poll-check
      sequence:
      - action: automation.turn_off
        target:
          entity_id: automation.motion_schlafzimmer
        data:
          stop_actions: true
      - action: switch.turn_off
        target:
          entity_id: switch.adaptive_lighting_adapt_brightness_arbeitszimmer
      - delay:
          milliseconds: 300
      - action: light.turn_off
        target:
          entity_id: light.alle_arbeitszimmer_lichter
      - delay:
          milliseconds: 500
      - action: light.turn_on
        target:
          entity_id: light.philips_light_16_tv
        data:
          brightness_pct: 30
      - delay:
          milliseconds: 500
      - action: adaptive_lighting.apply
        data:
          entity_id: switch.adaptive_lighting_arbeitszimmer
          lights:
          - light.philips_light_16_tv
          adapt_brightness: false
          adapt_color: true
    - conditions:
      - condition: trigger
        id: stopped
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.philips_light_16_tv
      - action: switch.turn_on
        target:
          entity_id: switch.adaptive_lighting_adapt_brightness_arbeitszimmer
      - action: automation.turn_on
        target:
          entity_id: automation.motion_schlafzimmer
  mode: restart
