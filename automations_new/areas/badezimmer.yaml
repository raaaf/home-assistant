# Areas - Badezimmer.Yaml
# Generated by automation splitter - 9 automations
# Part of Home Assistant configuration

- id: '1646852212486'
  alias: Badezimmer » Luftfeuchtigkeit
  description: 'Steuert den Badezimmerlüfter basierend auf Luftfeuchtigkeit (>60 %
    an, <59 % aus)

    '
  triggers:
  - entity_id: sensor.aqara_climate_02_humidity
    above: 65
    id: above
    trigger: numeric_state
  - entity_id: sensor.aqara_climate_02_humidity
    below: 60
    id: below
    trigger: numeric_state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: above
      sequence:
      - target:
          entity_id: switch.luefter_badezimmer
        action: switch.turn_on
        data: {}
    - conditions:
      - condition: trigger
        id: below
      sequence:
      - target:
          entity_id: switch.luefter_badezimmer
        action: switch.turn_off
        data: {}
  mode: single
  max_exceeded: silent
- id: '1647715674725'
  alias: Scenen » Sauna
  description: Aktiviert Sauna-Modus mit spezieller Beleuchtung, Lüftung und Rollosteuerung
  triggers:
  - entity_id:
    - input_boolean.sauna
    to: 'on'
    id: 'on'
    trigger: state
  - entity_id:
    - input_boolean.sauna
    to: 'off'
    id: 'off'
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: 'on'
      sequence:
      - alias: "Deaktiviere adaptive Beleuchtung"
        action: script.scene_disable_adaptive_lighting
        data:
          room: "badezimmer"
      - alias: "Deaktiviere Motion-Automationen"
        action: script.scene_disable_motion_automations
        data:
          automations: "automation.motion_badezimmer_gross"
      - action: cover.set_cover_position
        target:
          entity_id: cover.ikea_cover_01
        data:
          position: 0
      - data: {}
        target:
          entity_id: switch.luefter_badezimmer
        action: switch.turn_on
      - alias: "Start Hue effect: fireplace (Sauna)"
        action: light.turn_on
        target:
          entity_id:
          - light.alle_badezimmer_lichter
          - light.alle_badezimmer_nachtlichter
        data:
          effect: fireplace
          brightness_pct: 70
          transition: 10
    - conditions:
      - condition: trigger
        id: 'off'
      sequence:
      - alias: "Stop Hue effect"
        action: light.turn_on
        target:
          entity_id:
          - light.alle_badezimmer_lichter
          - light.alle_badezimmer_nachtlichter
        data:
          effect: stop_effect
      - alias: "Reset RGB lights to color_temp mode before turning off"
        action: light.turn_on
        data:
          color_temp_kelvin: 2700
          brightness_pct: 1
        target:
          entity_id:
          - light.alle_badezimmer_lichter
          - light.alle_badezimmer_nachtlichter
      - delay:
          milliseconds: 500
      - action: light.turn_off
        data:
          transition: 5
        target:
          entity_id:
          - light.alle_badezimmer_lichter
          - light.alle_badezimmer_nachtlichter
      - action: cover.set_cover_position
        target:
          entity_id: cover.ikea_cover_01
        data:
          position: 100
      - delay:
          seconds: 6
      - alias: "Reaktiviere adaptive Beleuchtung mit Konflikt-Prüfung"
        action: script.scene_enable_adaptive_lighting
        data:
          room: "badezimmer"
          exclude_scenes: "baden,party"
      - alias: "Reaktiviere Motion-Automationen mit Konflikt-Prüfung"
        action: script.scene_enable_motion_automations
        data:
          automations: "automation.motion_badezimmer_gross"
          exclude_scenes: "baden"
    default: []
  mode: restart
