# System - Core.Yaml
# Generated by automation splitter - 2 automations
# Part of Home Assistant configuration

- id: '1642085317177'
  alias: Helpers » Fenster / Türen
  description: Intelligente Warnanzeige für offene Fenster/Türen mit Eskalation, Wetterberücksichtigung
    und adaptiver Beleuchtung
  mode: restart
  max_exceeded: silent
  triggers:
  - trigger: state
    entity_id: binary_sensor.fenster_tueren
    to: 'on'
    for:
      hours: 0
      minutes: 1
      seconds: 0
    id: open
  - trigger: state
    entity_id: binary_sensor.fenster_tueren
    to: 'off'
    id: closed
  - trigger: state
    entity_id: binary_sensor.fenster_tueren
    to: 'on'
    for:
      hours: 0
      minutes: 10
      seconds: 0
    id: escalation
  - trigger: state
    entity_id: input_boolean.alle_sind_weg
    to: 'on'
    id: leaving
  conditions: []
  actions:
  - variables:
      open_elements: "{{ expand(state_attr('binary_sensor.fenster_tueren', 'entity_id'))\
        \ \n   | selectattr('state', 'in', ['on', 'open']) \n   | map(attribute='name')\
        \ | join(', ') | default('Unbekannt', true) }}\n"
      open_duration_minutes: '{{ ((now() - states.binary_sensor.fenster_tueren.last_changed).total_seconds()
        / 60) | round(1) }}

        '
      is_cold_outside: '{{ states(''sensor.temperatur_aussen'') | float(20) < 5 }}

        '
      is_bad_weather: "{{ states('weather.fuerth_bayern') in ['rainy', 'snowy', 'windy']\
        \ or \n   states('sensor.luftfeuchtigkeit_aussen') | float(50) > 85 }}\n"
      heating_active: '{{ (has_value(''climate.schlafzimmer'') and is_state(''climate.schlafzimmer'',
        ''on'')) or (has_value(''climate.ac'') and is_state(''climate.ac'', ''heat''))
        }}

        '
      is_night_quiet_hours: '{{ now().hour >= 22 or now().hour < 6 }}

        '
      is_critical_situation: '{{ is_cold_outside or (is_bad_weather and heating_active)
        }}

        '
      all_away: '{{ is_state(''input_boolean.alle_sind_weg'', ''on'') }}

        '
  - choose:
    - alias: Benachrichtigung beim Verlassen des Hauses
      conditions:
      - condition: trigger
        id: leaving
      - alias: Fenster/Türen sind offen
        condition: state
        entity_id: binary_sensor.fenster_tueren
        state: 'on'
      sequence:
      - alias: Push-Benachrichtigung beim Verlassen
        if:
        - condition: template
          value_template: '{{ has_value(''notify.family'') }}'
        then:
        - action: notify.family
          data:
            title: 🏠 Fenster/Türen noch offen!
            message: 'Beim Verlassen des Hauses: {{ open_elements }} {% if is_cold_outside
              %}(Außentemperatur: {{ states(''sensor.temperatur_aussen'') }}°C){% endif
              %}{% if is_bad_weather %} - Schlechtes Wetter!{% endif %}'
            data:
              priority: high
              tag: fenster_tueren_verlassen
      - alias: Verlassen mit offenen Fenstern loggen
        action: logbook.log
        data:
          name: Fenster/Türen beim Verlassen
          message: 'Haus verlassen mit offenen Fenstern/Türen: {{ open_elements }}

            '
    - alias: Fenster/Türen offen - Adaptive Warnung aktivieren (nur wenn zuhause)
      conditions:
      - condition: trigger
        id: open
      - alias: Jemand ist zuhause
        condition: state
        entity_id: input_boolean.alle_sind_weg
        state: 'off'
      - alias: Aqara Hub ist verfügbar
        condition: template
        value_template: '{{ has_value(''light.aqara_hub_lightbulb'') }}'
      - alias: Warnung auch nachts nur bei kritischen Situationen
        condition: or
        conditions:
        - condition: template
          value_template: '{{ not is_night_quiet_hours }}'
        - condition: template
          value_template: '{{ is_critical_situation }}'
      sequence:
      - alias: Adaptive Warnbeleuchtung basierend auf Situation
        action: light.turn_on
        target:
          entity_id: light.aqara_hub_lightbulb
        data:
          rgb_color: "{% if is_critical_situation %}\n  [255, 0, 255]  # Magenta bei\
            \ kritischem Wetter/Kälte\n{% elif open_duration_minutes < 5 %}\n  [255,\
            \ 165, 0]  # Orange: 1-5 Min\n{% else %}\n  [255, 69, 0]   # Rot-Orange:\
            \ >5 Min\n{% endif %}\n"
          brightness_pct: "{% if is_critical_situation %}\n  60\n{% elif is_night_quiet_hours\
            \ %}\n  15  # Gedämpft nachts\n{% else %}\n  {{ min(25 + (open_duration_minutes\
            \ * 2), 50) | int }}\n{% endif %}\n"
          effect: '{{ ''color_loop'' if (is_critical_situation and heating_active)
            else ''none'' }}'
      - alias: Pulsierende Warnung bei kritischen Bedingungen
        if:
        - condition: template
          value_template: '{{ is_critical_situation }}'
        then:
        - repeat:
            count: 3
            sequence:
            - action: light.turn_on
              target:
                entity_id: light.aqara_hub_lightbulb
              data:
                brightness_pct: 80
            - delay: 00:00:01
            - action: light.turn_on
              target:
                entity_id: light.aqara_hub_lightbulb
              data:
                brightness_pct: 20
            - delay: 00:00:01
      - alias: Erste Warnung in Logbuch eintragen
        action: logbook.log
        data:
          name: Fenster/Türen Warnung
          message: 'Fenster/Türen seit 1+ Min offen - {{ ''KRITISCHE'' if is_critical_situation
            else ''Standard'' }} Warnung aktiviert. Offen: {{ open_elements }}. Bedingungen:
            Außentemp {{ states(''sensor.temperatur_aussen'') }}°C,  Wetter: {{ states(''weather.fuerth_bayern'')
            }},  Heizung: {{ ''an'' if heating_active else ''aus'' }}

            '
    - alias: Eskalation nach 10+ Minuten (nur wenn zuhause)
      conditions:
      - condition: trigger
        id: escalation
      - alias: Jemand ist zuhause
        condition: state
        entity_id: input_boolean.alle_sind_weg
        state: 'off'
      - alias: Aqara Hub ist verfügbar
        condition: template
        value_template: '{{ has_value(''light.aqara_hub_lightbulb'') }}'
      sequence:
      - alias: Intensivere Warnbeleuchtung
        action: light.turn_on
        target:
          entity_id: light.aqara_hub_lightbulb
        data:
          rgb_color:
          - 255
          - 0
          - 0
          brightness_pct: '{{ 80 if is_critical_situation else 60 }}

            '
          effect: '{{ ''color_loop'' if is_critical_situation else ''none'' }}'
      - alias: Eskalation in Logbuch eintragen
        action: logbook.log
        data:
          name: Fenster/Türen Eskalation
          message: 'ESKALATION: Fenster/Türen seit {{ open_duration_minutes }} Min
            offen! Bedingungen: {{ ''KRITISCH'' if is_critical_situation else ''Normal''
            }}

            '
    - alias: Fenster/Türen geschlossen - Warnung deaktivieren
      conditions:
      - condition: trigger
        id: closed
      - alias: Aqara Hub ist verfügbar
        condition: template
        value_template: '{{ has_value(''light.aqara_hub_lightbulb'') }}'
      sequence:
      - alias: Warnbeleuchtung ausschalten
        action: light.turn_off
        target:
          entity_id: light.aqara_hub_lightbulb
        data: {}
      - alias: Entwarnung in Logbuch eintragen
        action: logbook.log
        data:
          name: Fenster/Türen Entwarnung
          message: 'Alle Fenster/Türen geschlossen nach {{ open_duration_minutes }}
            Min - Warnung deaktiviert

            '
    - alias: Fehlerbehandlung - Hub nicht verfügbar
      conditions:
      - condition: template
        value_template: '{{ not has_value(''light.aqara_hub_lightbulb'') }}'
      - alias: Jemand ist zuhause (keine Alternative bei Abwesenheit)
        condition: state
        entity_id: input_boolean.alle_sind_weg
        state: 'off'
      sequence:
      - alias: Fehler loggen
        action: logbook.log
        data:
          name: Fenster/Türen Warnung Fehler
          message: 'Aqara Hub nicht verfügbar - Warnung konnte nicht {{ ''aktiviert''
            if trigger.id == ''open'' else ''deaktiviert'' }} werden. Status: {{ states(''light.aqara_hub_lightbulb'')
            }}.'
- id: '1740754575040'
  alias: System » Zentrale Fehlerbehandlung
  description: Verarbeitet alle Systemfehler zentral und reagiert entsprechend
  triggers:
  - event_type: home_assistant_error
    trigger: event
  - entity_id:
    - input_text.fehlerprotokoll
    trigger: state
  conditions:
  - "{{ trigger.platform == 'event' or (trigger.platform == 'state'
      and trigger.to_state.state != trigger.from_state.state) }}"
  actions:
  - variables:
      error_message: "{% if trigger.platform == 'event' %}\n  {{ trigger.event.data.message\
        \ }}\n{% else %}\n  {{ trigger.to_state.state }}\n{% endif %}\n"
      error_severity: "{% if trigger.platform == 'event' %}\n  {{ trigger.event.data.severity\
        \ | default('Warnung') }}\n{% else %}\n  {{ 'Info' }}\n{% endif %}"
      error_entity: "{% if trigger.platform == 'event' %}\n  {{ trigger.event.data.entity_id\
        \ | default('unbekannt') }}\n{% else %}\n  {{ trigger.entity_id | default('unbekannt') }}\n{% endif %}"
  - data:
      name: Systemfehler
      message: '{{ error_severity }}: {{ error_message }} ({{ error_entity }})'
    action: logbook.log
  - if:
      - condition: template
        value_template: '{{ has_value(''notify.admin_only'') }}'
    then:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ error_severity == 'Kritisch' }}"
            sequence:
            - action: notify.admin_only
              data:
                title: ⚠️ KRITISCHER FEHLER ⚠️
                message: '{{ error_message }}'
                data:
                  push:
                    interruption-level: critical
          - conditions:
              - condition: template
                value_template: "{{ error_severity == 'Warnung' }}"
            sequence:
            - action: notify.admin_only
              data:
                title: ⚠️ System-Warnung
                message: '{{ error_message }}'
                data:
                  push:
                    interruption-level: time-sensitive
        default:
          - action: notify.admin_only
            data:
              title: ℹ️ System-Info
              message: '{{ error_message }}'
              data:
                push:
                  interruption-level: passive
    else:
      - action: logbook.log
        data:
          name: Benachrichtigung Fehler
          message: 'Admin notification service nicht verfügbar für Fehler: {{ error_message }}'
  mode: queued
  max: 10

- id: '1733679600000'
  alias: System » Z2M OTA Updates
  description: Checks for and triggers Zigbee2MQTT OTA firmware updates daily at 19:30
  mode: single
  triggers:
    - trigger: time_pattern
      hours: '19'
      minutes: '30'
  conditions: []
  actions:
    - alias: Get list of Z2M devices needing an update
      variables:
        update_entities: >
          {{ integration_entities('mqtt')
             | select('match', '^update\\.')
             | select('is_state', 'on')
             | reject('is_state_attr', 'in_progress', true)
             | list }}
    - alias: Run OTA update on devices with updates
      repeat:
        for_each: '{{ update_entities }}'
        sequence:
          - alias: Get Z2M device name from entity
            variables:
              triggered_entity: '{{ repeat.item }}'
              device_name: >
                {{ repeat.item | replace('update.', '') | regex_replace('_firmware$|_update$', '') }}
          - alias: Send MQTT message to Z2M to request update
            action: mqtt.publish
            data:
              qos: '0'
              retain: false
              topic: zigbee2mqtt/bridge/request/device/ota_update/update
              payload: '{"id": "{{ device_name }}"}'
          - alias: Wait a minute for the Z2M update to start
            wait_template: "{{ is_state_attr(triggered_entity, 'in_progress', true) }}"
            timeout: '00:01:00'
            continue_on_timeout: true
          - alias: Wait up to 1 hour for the OTA upgrade to finish
            wait_template: "{{ is_state_attr(triggered_entity, 'in_progress', false) }}"
            timeout: '01:00:00'
            continue_on_timeout: true
          - alias: Log completed update
            action: logbook.log
            data:
              name: Z2M OTA Update
              message: 'Firmware update completed for {{ device_name }}'

- id: '1740930000000'
  alias: System » Adaptive Lighting Settings nach Neustart
  description: >
    Stellt optimierte AL-Einstellungen nach jedem HA-Neustart wieder her.
    Hintergrund: AL speichert Konfiguration in Config Entries (nicht YAML),
    daher müssen Änderungen via change_switch_settings nach Neustarts neu gesetzt werden.
    Änderungen: separate_turn_on_commands=false (weniger MQTT-Traffic),
    take_over_control_mode=pause_changed (pausiert nur geänderte Attribute).
    adapt_only_on_bare_turn_on bleibt false - true verursacht 100% Helligkeit beim Einschalten
    via Automationen mit expliziten Werten (wird als manual_control fehlinterpretiert).
  mode: single
  triggers:
    - trigger: homeassistant
      event: start
  conditions: []
  actions:
    - alias: Kurz warten bis AL-Switches bereit sind
      delay: "00:00:30"
    - alias: AL-Einstellungen für alle Räume setzen
      repeat:
        for_each:
          - switch.adaptive_lighting_wohnzimmer
          - switch.adaptive_lighting_kueche
          - switch.adaptive_lighting_schlafzimmer
          - switch.adaptive_lighting_kinderzimmer
          - switch.adaptive_lighting_badezimmer
          - switch.adaptive_lighting_waschzimmer
          - switch.adaptive_lighting_arbeitszimmer
          - switch.adaptive_lighting_ankleide
          - switch.adaptive_lighting_flur
          - switch.adaptive_lighting_balkon
        sequence:
          - action: adaptive_lighting.change_switch_settings
            data:
              entity_id: "{{ repeat.item }}"
              separate_turn_on_commands: false
              take_over_control_mode: pause_changed
              adapt_only_on_bare_turn_on: false
              use_defaults: current
    - alias: Abschluss loggen
      action: logbook.log
      data:
        name: Adaptive Lighting Setup
        message: Optimierte AL-Einstellungen nach Neustart gesetzt (10 Räume)
