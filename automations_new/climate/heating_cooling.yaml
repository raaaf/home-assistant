# Climate - Heating Cooling.Yaml
# Generated by automation splitter - 6 automations
# Part of Home Assistant configuration

- id: '1654346657855'
  alias: Helper » Heute wird es sehr heiß werden
  description: 'Prüft täglich um 3 Uhr die Wettervorhersage und setzt Heißwetter-Flags
    (>24°C und >29°C)

    '
  triggers:
  - at: 03:00:00
    trigger: time
  conditions: []
  actions:
  - if:
    - condition: template
      value_template: '{{ states(''sensor.fuerth_daily'') not in [''unknown'', ''unavailable''] and state_attr(''sensor.fuerth_daily'', ''forecast'') is not none and state_attr(''sensor.fuerth_daily'', ''forecast'') | length > 0 and state_attr(''sensor.fuerth_daily'', ''forecast'')[0].temperature > 29 }}

        '
    then:
    - target:
        entity_id: input_boolean.heute_wird_es_sehr_heiss_werden
      action: input_boolean.turn_on
    else:
    - target:
        entity_id: input_boolean.heute_wird_es_sehr_heiss_werden
      action: input_boolean.turn_off
  - if:
    - condition: template
      value_template: '{{ states(''sensor.fuerth_daily'') not in [''unknown'', ''unavailable''] and state_attr(''sensor.fuerth_daily'', ''forecast'') is not none and state_attr(''sensor.fuerth_daily'', ''forecast'') | length > 0 and 24 < state_attr(''sensor.fuerth_daily'', ''forecast'')[0].temperature <= 29 }}

        '
    then:
    - target:
        entity_id: input_boolean.heute_wird_es_heiss_werden
      action: input_boolean.turn_on
    else:
    - target:
        entity_id: input_boolean.heute_wird_es_heiss_werden
      action: input_boolean.turn_off
  mode: single
- id: '1721922920220'
  alias: Helper » AC manual
  description: >
    Intelligente Klimaanlagen-Steuerung mit Hysterese: an ab 25.5°C, aus unter 24.5°C.
    Das Fenster entscheidet den Modus: Fenster zu -> Cool, Fenster auf -> nur Umluft (Fan).
    Hybrid-Sensor: Arbeitszimmer-Temp bei Arbeit/Gaming (AC steht im Arbeitszimmer),
    Schlafzimmer-Temp bei Schlafenszeit/AppleTV.
    Gate: nur bei Anwesenheit, niemand abwesend. Aussentemperatur egal.
    Setpoint: 24°C. Preset ieco bei Arbeit/Gaming.
  triggers:
  - entity_id:
    - input_boolean.arbeit
    - input_boolean.gaming
    to: 'on'
    id: aktivität-an
    for:
      hours: 0
      minutes: 1
      seconds: 0
    trigger: state
  - entity_id: input_boolean.schlafenszeit
    to: 'on'
    id: schlafenszeit-an
    for: 00:00:10
    trigger: state
  - entity_id:
    - input_boolean.arbeit
    - input_boolean.gaming
    - input_boolean.schlafenszeit
    to: 'off'
    id: modus-aus
    for: 00:00:10
    trigger: state
  - entity_id:
    - sensor.temperatur_schlafzimmer
    - sensor.arbeitszimmer_temperatur
    below: 24.5
    for: 00:03:00
    trigger: numeric_state
    id: temp-kalt
  - entity_id:
    - sensor.temperatur_schlafzimmer
    - sensor.arbeitszimmer_temperatur
    above: 25.4
    for: 00:03:00
    trigger: numeric_state
    id: temp-warm
  - entity_id:
    - sensor.temperatur_schlafzimmer
    - sensor.arbeitszimmer_temperatur
    trigger: state
    for: 00:02:00
    id: temp-check
  # Fenster zu/auf: Zielmodus neu bewerten (zu -> evtl. cool, auf -> Umluft)
  - entity_id: binary_sensor.fenster_tueren_ohne_arbeitszimmer
    trigger: state
    for: 00:00:15
    id: fenster-check
  # Anwesenheit Zone AZ+SZ: MacBooks und AppleTV Schlafzimmer
  - entity_id:
    - binary_sensor.macbook_pro_rafael_active_2
    - binary_sensor.macbook_pro_2_active
    trigger: state
    id: praesenz-mac
  - entity_id: media_player.appletv
    trigger: state
    id: praesenz-tv
  conditions:
  - condition: state
    entity_id: input_boolean.alle_sind_weg
    state: 'off'
  # Manueller Override aktiv: Automatik pausiert, bis Timer ablaeuft (2h).
  - condition: state
    entity_id: input_boolean.ac_override
    state: 'off'
  actions:
  - variables:
      arbeit_aktiv: '{{ has_value(''input_boolean.arbeit'') and is_state(''input_boolean.arbeit'', ''on'') }}'
      gaming_aktiv: '{{ has_value(''input_boolean.gaming'') and is_state(''input_boolean.gaming'', ''on'') }}'
      schlafenszeit_aktiv: '{{ has_value(''input_boolean.schlafenszeit'') and is_state(''input_boolean.schlafenszeit'', ''on'') }}'
      irgendein_modus_aktiv: '{{ arbeit_aktiv or gaming_aktiv or schlafenszeit_aktiv
        }}'
      macbook_aktiv: '{{ is_state(''binary_sensor.macbook_pro_rafael_active_2'', ''on'') or is_state(''binary_sensor.macbook_pro_2_active'', ''on'') }}'
      appletv_an: "{{ is_state('media_player.appletv', 'playing') }}"
      # Anwesenheit in der Zone AZ+SZ: aktiver Modus, ein aktives MacBook oder laufender
      # AppleTV im Schlafzimmer. Gate fuer Kuehlen und Umluft.
      zone_anwesend: '{{ irgendein_modus_aktiv or macbook_aktiv or appletv_an }}'
      # Hybrid-Sensor: Arbeit/Gaming nutzt Arbeitszimmer-Temp (AC blaest direkt rein),
      # Schlafenszeit/AppleTV nutzt Schlafzimmer-Temp. Fallback: AZ, dann Schlafzimmer, dann AC indoor.
      # Qingping-Temp wird NICHT genutzt (defekt, liest 4-8 Grad zu niedrig).
      raum_temp: >-
        {% set arbeit = states('sensor.arbeitszimmer_temperatur') %}
        {% set schlafzimmer = states('sensor.temperatur_schlafzimmer') %}
        {% set ac_indoor = states('sensor.ac_indoor_temperature') %}
        {% if (arbeit_aktiv or gaming_aktiv) and has_value('sensor.arbeitszimmer_temperatur') %}
          {{ arbeit | float(25) }}
        {% elif (schlafenszeit_aktiv or appletv_an) and has_value('sensor.temperatur_schlafzimmer') %}
          {{ schlafzimmer | float(25) }}
        {% elif has_value('sensor.arbeitszimmer_temperatur') %}
          {{ arbeit | float(25) }}
        {% elif has_value('sensor.temperatur_schlafzimmer') %}
          {{ schlafzimmer | float(25) }}
        {% elif has_value('sensor.ac_indoor_temperature') %}
          {{ ac_indoor | float(25) }}
        {% else %}
          25
        {% endif %}
      # Fenster zu (ausser AZ, dort haengt der AC-Schlauch). Kuehlen nur bei zu, Umluft immer erlaubt.
      fenster_zu: "{{ is_state('binary_sensor.fenster_tueren_ohne_arbeitszimmer', 'off') }}"
      aktueller_modus: '{{ states(''climate.ac'') if has_value(''climate.ac'') else ''off'' }}'
      ac_laeuft: '{{ aktueller_modus not in [''off'', ''unknown'', ''unavailable''] }}'
      ziel_setpoint: 24
      # Warm genug fuer AC-Aktion. Hysterese: an ab 25.5, aus erst unter 24.5.
      warm: '{{ (raum_temp >= 24.5) if ac_laeuft else (raum_temp >= 25.5) }}'
      # Aktiv nur bei Anwesenheit. Das Fenster entscheidet cool vs. Umluft:
      # Fenster zu -> kuehlen, Fenster auf -> nur Umluft (kuehlen waere sinnlos).
      # Aussentemperatur egal.
      ziel_modus: >-
        {% if zone_anwesend and warm and fenster_zu %}
          cool
        {% elif zone_anwesend and warm %}
          fan_only
        {% else %}
          off
        {% endif %}
  - choose:
    # Aus
    - conditions:
      - condition: template
        value_template: '{{ ziel_modus == ''off'' and ac_laeuft }}'
      sequence:
      - action: climate.turn_off
        target:
          entity_id: climate.ac
        data: {}
    # Kuehlen
    - conditions:
      - condition: template
        value_template: '{{ ziel_modus == ''cool'' }}'
      sequence:
      - if:
        - condition: template
          value_template: '{{ aktueller_modus != ''cool'' }}'
        then:
        - action: climate.set_hvac_mode
          data:
            hvac_mode: cool
          target:
            entity_id: climate.ac
        - delay: 00:00:02
      # ieco (intelligent eco) bei Arbeit/Gaming: drosselt den Kompressor sparsam.
      # Hinweis: ieco und gear (rate_select) schliessen sich aus, daher kein gear.
      - if:
        - condition: template
          value_template: '{{ (arbeit_aktiv or gaming_aktiv) and state_attr(''climate.ac'', ''preset_mode'') != ''ieco'' }}'
        then:
        - action: climate.set_preset_mode
          data:
            preset_mode: ieco
          target:
            entity_id: climate.ac
      - if:
        - condition: template
          value_template: '{{ state_attr(''climate.ac'', ''fan_mode'') != ''silent'' }}'
        then:
        - action: climate.set_fan_mode
          data:
            fan_mode: silent
          target:
            entity_id: climate.ac
      - if:
        - condition: template
          value_template: '{{ state_attr(''climate.ac'', ''temperature'') | float(0) != ziel_setpoint }}'
        then:
        - action: climate.set_temperature
          data:
            temperature: '{{ ziel_setpoint }}'
          target:
            entity_id: climate.ac
    # Umluft (auch ohne Modus und bei offenem Fenster)
    - conditions:
      - condition: template
        value_template: '{{ ziel_modus == ''fan_only'' }}'
      sequence:
      - if:
        - condition: template
          value_template: '{{ aktueller_modus != ''fan_only'' }}'
        then:
        - action: climate.set_hvac_mode
          data:
            hvac_mode: fan_only
          target:
            entity_id: climate.ac
        - delay: 00:00:02
      - if:
        - condition: template
          value_template: '{{ state_attr(''climate.ac'', ''fan_mode'') != ''silent'' }}'
        then:
        - action: climate.set_fan_mode
          data:
            fan_mode: silent
          target:
            entity_id: climate.ac
  mode: single
  max_exceeded: silent
- id: '1743835898091'
  alias: Helper » Frostwarnung für Blumen (morgen früh unter 0°C)
  description: 'Sendet eine kritische Notification, wenn es in der Nacht auf morgen
    Frost geben soll (nur einmal pro Frostperiode)

    '
  triggers:
  - at: '10:00:00'
    trigger: time
  conditions:
  - condition: template
    value_template: "{% if states('sensor.fuerth_daily') not in ['unknown', 'unavailable'] and state_attr('sensor.fuerth_daily', 'forecast') is not none %}\n  {% set forecast = state_attr('sensor.fuerth_daily', 'forecast') %}\n  {% if forecast and forecast | length > 0 %}\n    {{ forecast[0].templow < 0 }}\n  {% else %}\n    false\n  {% endif %}\n{% else %}\n  false\n{% endif %}\n"
  - condition: state
    entity_id: input_boolean.frost_warning_sent
    state: 'off'
  actions:
  - action: notify.alex
    data:
      title: "Frostwarnung für die Blumen"
      message: "Heute Nacht Frost unter 0°C vorhergesagt. Bitte Blumen abdecken."
  - action: persistent_notification.create
    data:
      title: "Frostwarnung für die Blumen"
      message: "In der Nacht sind Frostwerte unter 0°C vorhergesagt. Bitte die Blumen abdecken, um sie vor dem Frost zu schützen."
      notification_id: frostwarnung_blumen
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.frost_warning_sent
  mode: single
- id: '1749643406352'
  alias: Ventilator » Kinderzimmer
  # Arbeitszimmer hat keinen eigenen Fan - dort uebernimmt climate.ac
  # (gesteuert via "Helper » AC manual").
  description: 'Kinderzimmer-Fan: temperaturgesteuert. Tagsueber zusaetzlich Belegung
    (Radar) noetig, in der Schlafenszeit nur Temperatur. Schwelle 23 Grad (Schlaf) bzw.
    25 Grad (sonst). Unabhaengig von der Aussentemperatur.'
  triggers:
  - entity_id: sensor.kinderzimmer_temperatur_und_luftfeuchtigkeit_temperature
    trigger: state
    for: 00:02:00
    id: temp-check
  - entity_id: input_boolean.schlafenszeit
    trigger: state
    id: modus-change
  - entity_id: input_boolean.alle_sind_weg
    trigger: state
    id: presence-change
  - entity_id: binary_sensor.kinderzimmer_motion_presence
    to: 'on'
    trigger: state
    id: belegt-an
  - entity_id: binary_sensor.kinderzimmer_motion_presence
    to: 'off'
    for: 00:10:00
    trigger: state
    id: belegt-aus
  conditions: []
  actions:
  - variables:
      kinder_fan: fan.kinderzimmer
      niemand_zuhause: '{{ has_value(''input_boolean.alle_sind_weg'') and is_state(''input_boolean.alle_sind_weg'', ''on'') }}'
      schlafenszeit_aktiv: '{{ has_value(''input_boolean.schlafenszeit'') and is_state(''input_boolean.schlafenszeit'', ''on'') }}'
      temp: "{{ states('sensor.kinderzimmer_temperatur_und_luftfeuchtigkeit_temperature') | float(22) }}"
      fan_an: '{{ has_value(''fan.kinderzimmer'') and is_state(''fan.kinderzimmer'', ''on'') }}'
      # Belegung per Radar (erkennt auch stille Personen). 10-Min-Nachlauf, damit der
      # Fan bei kurzen Abwesenheiten nicht flattert.
      belegt: >-
        {% set p = states.binary_sensor.kinderzimmer_motion_presence %}
        {{ is_state('binary_sensor.kinderzimmer_motion_presence', 'on')
           or (p is not none and (now() - p.last_changed).total_seconds() < 600) }}
      # An ab 23 Grad (Schlafenszeit) bzw. 25 Grad (sonst). Hysterese: bleibt an bis
      # 1 Grad unter der Einschaltschwelle.
      temp_warm: >-
        {% set floor = 23 if schlafenszeit_aktiv else 25 %}
        {{ (not fan_an and temp > floor) or (fan_an and temp > floor - 1) }}
      # Tagsueber zusaetzlich Belegung noetig, in der Schlafenszeit nur Temperatur.
      soll_an: '{{ not niemand_zuhause and temp_warm and (schlafenszeit_aktiv or belegt) }}'
      ziel_speed: "{% if temp > 28 %}50{% elif temp > 26 %}35{% elif temp > 24 %}25{% else %}20{% endif %}"
  - choose:
    # Einschalten + Speed setzen
    - conditions:
      - condition: template
        value_template: '{{ soll_an and not fan_an }}'
      sequence:
      - action: fan.turn_on
        target:
          entity_id: '{{ kinder_fan }}'
        data: {}
      - action: fan.set_percentage
        data:
          percentage: '{{ ziel_speed }}'
        target:
          entity_id: '{{ kinder_fan }}'
    # Laeuft: Speed an Temperatur anpassen
    - conditions:
      - condition: template
        value_template: '{{ soll_an and fan_an }}'
      sequence:
      - action: fan.set_percentage
        data:
          percentage: '{{ ziel_speed }}'
        target:
          entity_id: '{{ kinder_fan }}'
    # Ausschalten
    - conditions:
      - condition: template
        value_template: '{{ not soll_an and fan_an }}'
      sequence:
      - action: fan.turn_off
        target:
          entity_id: '{{ kinder_fan }}'
        data: {}
  mode: single
- id: '1749999999998'
  alias: Heizung » Smart Floor Control (Predictive)
  description: 'Predictive floor heating control for slow-response system (1-2h warmup). Morning boost based on current outdoor temp, afternoon boost based on daily high forecast. Only controls Kinderzimmer, Schlafzimmer, Wohnzimmer.'
  triggers:
  - at: "06:30:00"
    id: morning-boost
    trigger: time
  - at: "14:30:00"
    id: afternoon-boost
    trigger: time
  conditions: []
  actions:
  - variables:
      heating_switches:
      - switch.heizung_kinderzimmer
      - switch.heizung_schlafzimmer
      - switch.heizung_wohnzimmer
      temp_source: >-
        {% if trigger.id == 'morning-boost' %}
          {{ state_attr('weather.fuerth_bayern', 'temperature') | float(5) }}
        {% else %}
          {% set forecast = state_attr('sensor.fuerth_daily', 'forecast') %}
          {% if forecast and forecast | length > 0 %}
            {{ forecast[0].temperature | float(5) }}
          {% else %}
            5
          {% endif %}
        {% endif %}
      boost_duration: >-
        {% if temp_source | float < 0 %}
          03:00:00
        {% elif temp_source | float < 5 %}
          02:00:00
        {% elif temp_source | float < 10 %}
          01:30:00
        {% else %}
          00:00:00
        {% endif %}
  - choose:
    # === LAYER 1: MORNING BOOST (06:00) ===
    - conditions:
      - condition: trigger
        id: morning-boost
      - condition: or
        conditions:
        # Someone is home
        - condition: state
          entity_id: input_boolean.alle_sind_weg
          state: 'off'
        # OR away less than 24 hours (short absence like picking up kids)
        - condition: template
          value_template: >
            {{ is_state('input_boolean.alle_sind_weg', 'on') and
               (now() - states.input_boolean.alle_sind_weg.last_changed).total_seconds() < 86400 }}
      - condition: template
        value_template: '{{ now().month <= 4 or now().month >= 10 }}'
      - condition: template
        value_template: "{{ boost_duration != '00:00:00' }}"
      sequence:
      - action: switch.turn_on
        target:
          entity_id: '{{ heating_switches }}'
      - action: logbook.log
        data:
          name: Heizung Morning Boost
          message: "Außentemperatur {{ temp_source | round(1) }}°C → Boost {{ boost_duration }}"
          domain: climate
      - action: timer.start
        target:
          entity_id: timer.heizung_boost
        data:
          duration: "{{ boost_duration }}"

    # === LAYER 2: AFTERNOON BOOST (15:00) ===
    - conditions:
      - condition: trigger
        id: afternoon-boost
      - condition: or
        conditions:
        # Someone is home
        - condition: state
          entity_id: input_boolean.alle_sind_weg
          state: 'off'
        # OR away less than 24 hours (short absence like picking up kids)
        - condition: template
          value_template: >
            {{ is_state('input_boolean.alle_sind_weg', 'on') and
               (now() - states.input_boolean.alle_sind_weg.last_changed).total_seconds() < 86400 }}
      - condition: template
        value_template: '{{ now().month <= 4 or now().month >= 10 }}'
      - condition: template
        value_template: "{{ boost_duration != '00:00:00' }}"
      sequence:
      - action: switch.turn_on
        target:
          entity_id: '{{ heating_switches }}'
      - action: logbook.log
        data:
          name: Heizung Afternoon Boost
          message: "Tages-Höchstwert {{ temp_source | round(1) }}°C → Boost {{ boost_duration }}"
          domain: climate
      - action: timer.start
        target:
          entity_id: timer.heizung_boost
        data:
          duration: "{{ boost_duration }}"
  mode: single
- id: '1749999999999'
  alias: Heizung » Boost Timer Finished
  description: 'Turns off heating when boost timer expires with verification and retry'
  triggers:
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.heizung_boost
  actions:
  - variables:
      heating_switches:
      - switch.heizung_kinderzimmer
      - switch.heizung_schlafzimmer
      - switch.heizung_wohnzimmer
  # First attempt: Turn off all switches
  - action: switch.turn_off
    target:
      entity_id: "{{ heating_switches }}"
  - delay: "00:00:03"
  # Verification loop with retry (max 3 attempts)
  - alias: Verify and retry if needed
    repeat:
      count: 3
      sequence:
      - variables:
          still_on: >
            {{ heating_switches | select('is_state', 'on') | list }}
      - if:
        - condition: template
          value_template: "{{ still_on | length == 0 }}"
        then:
        - action: logbook.log
          data:
            name: Heizung Boost beendet
            message: "1,5h Boost abgeschlossen - alle Schalter aus (Versuch {{ repeat.index }})"
            domain: climate
        - stop: "All switches confirmed off"
        else:
        - action: logbook.log
          data:
            name: Heizung Boost Retry
            message: "Versuch {{ repeat.index }}/3: Schalter noch an: {{ still_on | join(', ') }}"
            domain: climate
        - action: switch.turn_off
          target:
            entity_id: "{{ still_on }}"
        - delay: "00:00:05"
  # Final check after all retries
  - variables:
      final_check: >
        {{ heating_switches | select('is_state', 'on') | list }}
  - if:
    - condition: template
      value_template: "{{ final_check | length > 0 }}"
    then:
    - action: logbook.log
      data:
        name: Heizung Boost FEHLER
        message: "WARNUNG: Nach 3 Versuchen noch aktiv: {{ final_check | join(', ') }}"
        domain: climate
    - action: persistent_notification.create
      data:
        title: "Heizung Boost Fehler"
        message: "Schalter konnten nicht ausgeschaltet werden: {{ final_check | join(', ') }}"
        notification_id: heizung_boost_error
  mode: single
- id: '1750000000001'
  alias: Heizung » Safety Watchdog (2h Limit)
  description: 'Safety backup: Turns off heating if on > 2 hours without active timer'
  triggers:
  - trigger: time_pattern
    minutes: "/15"
  conditions:
  - condition: state
    entity_id: timer.heizung_boost
    state: idle
  - alias: "Race-Guard: HA laeuft seit mindestens 3 Minuten"
    condition: template
    value_template: >
      {% set last = state_attr('automation.heizung_restart_recovery_check', 'last_triggered') %}
      {{ last is none or (now() - last).total_seconds() > 180 }}
  actions:
  - variables:
      heating_switches:
      - switch.heizung_kinderzimmer
      - switch.heizung_schlafzimmer
      - switch.heizung_wohnzimmer
      max_on_seconds: 7200
      switches_on_too_long: >
        {% set result = namespace(switches=[]) %}
        {% for sw in heating_switches %}
          {% if is_state(sw, 'on') %}
            {% set on_duration = (now() - states[sw].last_changed).total_seconds() %}
            {% if on_duration > max_on_seconds %}
              {% set result.switches = result.switches + [sw] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ result.switches }}
  - condition: template
    value_template: "{{ switches_on_too_long | length > 0 }}"
  - action: logbook.log
    data:
      name: Heizung Safety Watchdog
      message: "WARNUNG: Schalter > 2h an ohne Timer: {{ switches_on_too_long | join(', ') }} - schalte aus"
      domain: climate
  - action: script.turn_off_with_retry
    data:
      target_entities: "{{ switches_on_too_long }}"
      retry_delay: 3
      max_retries: 1
  - variables:
      still_on_after: >
        {{ switches_on_too_long | select('is_state', 'on') | list }}
  - if:
    - condition: template
      value_template: "{{ still_on_after | length > 0 }}"
    then:
    - action: persistent_notification.create
      data:
        title: "Heizung Safety Watchdog"
        message: "Schalter waren > 2h an ohne Timer: {{ switches_on_too_long | join(', ') }}"
        notification_id: heizung_watchdog_warning
  mode: single
- id: '1750000000002'
  alias: Heizung » Restart Recovery Check
  description: 'After HA restart: Verify heating state matches timer state'
  triggers:
  - trigger: homeassistant
    event: start
  actions:
  - delay: "00:00:30"
  - variables:
      heating_switches:
      - switch.heizung_kinderzimmer
      - switch.heizung_schlafzimmer
      - switch.heizung_wohnzimmer
      timer_active: "{{ is_state('timer.heizung_boost', 'active') }}"
      switches_on: >
        {{ heating_switches | select('is_state', 'on') | list }}
  - if:
    - condition: template
      value_template: "{{ switches_on | length > 0 and not timer_active }}"
    then:
    - action: logbook.log
      data:
        name: Heizung Restart Recovery
        message: "Nach Neustart: Heizung an ({{ switches_on | join(', ') }}) aber Timer inaktiv"
        domain: climate
    - action: persistent_notification.create
      data:
        title: "Heizung Status nach Neustart"
        message: "Heizung ist an aber Timer ist inaktiv. Watchdog prüft alle 15 min. Schalter: {{ switches_on | join(', ') }}"
        notification_id: heizung_restart_check
  mode: single
- id: '1743835898092'
  alias: Helper » Frostwarnung zurücksetzen (jährlich im Mai)
  description: 'Setzt den Frostwarnung-Status am 1. Mai zurück für die neue Saison'
  triggers:
  - trigger: time
    at: '08:00:00'
  conditions:
  - condition: template
    value_template: "{{ now().month == 5 and now().day == 1 }}"
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.frost_warning_sent
  mode: single

# --- CO2-basierte Ventilator-Steuerung Schlafzimmer ---

- id: 'co2_ventilator_schlafzimmer'
  alias: "Ventilator » Schlafzimmer CO2-Steuerung"
  description: "Steuert fan.schlafzimmer nach CO2 UND Temperatur, unabhaengig von der Schlafenszeit. Speed = Maximum aus CO2- und Temperatur-Bedarf."
  mode: restart
  triggers:
    - trigger: state
      entity_id: sensor.fan_speed_schlafzimmer_co2_calculated
      id: 'co2-changed'
    - trigger: state
      entity_id: sensor.temperatur_schlafzimmer
      for: "00:02:00"
      id: 'temp-check'
    - trigger: state
      entity_id: input_boolean.schlafenszeit
      id: 'schlafenszeit-changed'
    - trigger: state
      entity_id:
        - binary_sensor.macbook_pro_rafael_active_2
        - binary_sensor.macbook_pro_2_active
      id: 'praesenz-mac'
    - trigger: state
      entity_id: media_player.appletv
      id: 'praesenz-tv'
    - trigger: state
      entity_id: sensor.qingping_air_monitor_lite_co2_carbon_dioxide
      to: 'unavailable'
      for: "00:05:00"
      id: 'sensor-unavailable'
  conditions:
    - condition: state
      entity_id: input_boolean.alle_sind_weg
      state: 'off'
    - condition: state
      entity_id: input_boolean.ventilator_schlafzimmer_override
      state: 'off'
  actions:
    - variables:
        temp: "{{ states('sensor.temperatur_schlafzimmer') | float(22) }}"
        co2_speed: "{{ states('sensor.fan_speed_schlafzimmer_co2_calculated') | int(0) }}"
        fan_an: "{{ has_value('fan.schlafzimmer') and is_state('fan.schlafzimmer', 'on') }}"
        # Anwesenheit Zone AZ+SZ: aktiver Modus, aktives MacBook oder laufender AppleTV.
        zone_anwesend: >-
          {{ is_state('input_boolean.arbeit', 'on') or is_state('input_boolean.gaming', 'on')
             or is_state('input_boolean.schlafenszeit', 'on')
             or is_state('binary_sensor.macbook_pro_rafael_active_2', 'on')
             or is_state('binary_sensor.macbook_pro_2_active', 'on')
             or is_state('media_player.appletv', 'playing') }}
        # Temperatur-Bedarf ab 23 Grad (Hysterese 1 Grad), nur bei Anwesenheit.
        temp_warm: >-
          {{ ((not fan_an and temp > 23) or (fan_an and temp > 22)) and zone_anwesend }}
        temp_speed: "{% if temp > 28 %}50{% elif temp > 26 %}35{% elif temp > 24 %}25{% else %}20{% endif %}"
        # Zielspeed = Maximum aus CO2- und Temperatur-Bedarf. CO2 ist nie an Anwesenheit
        # gekoppelt (CO2 steigt nur, wenn jemand da ist).
        ziel_speed: "{{ [co2_speed, (temp_speed | int if temp_warm else 0)] | max }}"
        soll_an: "{{ ziel_speed > 0 }}"
    - choose:
        # CO2-Sensor ausgefallen: Ventilator ausschalten, ABER nur wenn nicht
        # temperaturbedingt gebraucht (sonst faellt es durch zur soll_an-Logik).
        - conditions:
            - condition: trigger
              id: 'sensor-unavailable'
            - condition: template
              value_template: '{{ not temp_warm }}'
          sequence:
            - action: fan.turn_off
              target:
                entity_id: fan.schlafzimmer
            - action: logbook.log
              data:
                name: "Schlafzimmer Ventilator"
                message: "Ventilator aus — CO2-Sensor unavailable"

        # CO2 oder Temperatur erfordert Ventilator
        - conditions:
            - condition: template
              value_template: '{{ soll_an }}'
          sequence:
            - action: fan.turn_on
              target:
                entity_id: fan.schlafzimmer
              data:
                percentage: '{{ ziel_speed }}'
                preset_mode: "Natural Wind"

      # Sonst: Ventilator aus (CO2 niedrig genug und nicht warm)
      default:
        - condition: state
          entity_id: fan.schlafzimmer
          state: 'on'
        - action: fan.turn_off
          target:
            entity_id: fan.schlafzimmer

- id: 'co2_ventilator_override_detection'
  alias: "Ventilator » Schlafzimmer Override-Erkennung"
  description: "Erkennt manuelle Ventilator-Steuerung und aktiviert Override"
  mode: single
  triggers:
    - trigger: state
      entity_id: fan.schlafzimmer
      to: 'off'
  conditions:
    - alias: "Manuell (parent_id none), kein Reconnect aus unavailable"
      condition: template
      value_template: >-
        {{ trigger.from_state is not none
           and trigger.from_state.state not in ['unavailable', 'unknown']
           and trigger.to_state.context.parent_id is none }}
  actions:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.ventilator_schlafzimmer_override
    - action: timer.start
      target:
        entity_id: timer.ventilator_override
    - action: logbook.log
      data:
        name: "CO2 Ventilator"
        message: "Manueller Override aktiviert (2h)"

- id: 'co2_ventilator_override_reset'
  alias: "Ventilator » Schlafzimmer Override zurücksetzen"
  description: "Setzt Override zurück nach Timer-Ablauf oder Schlafenszeit-Ende"
  mode: single
  triggers:
    - trigger: event
      event_type: timer.finished
      event_data:
        entity_id: timer.ventilator_override
    - trigger: state
      entity_id: input_boolean.schlafenszeit
      to: 'off'
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ventilator_schlafzimmer_override
    - action: timer.cancel
      target:
        entity_id: timer.ventilator_override


- id: climate_fenster_stop_ac
  alias: "Klima » AC auf Umluft bei Fenster offen"
  description: >
    Schaltet die AC vom Kuehlen auf Umluft (fan_only) wenn Fenster oder Tueren
    waehrend des Betriebs geoeffnet werden. Umluft darf weiterlaufen, nur das
    Kuehlen bei offenem Fenster wird gestoppt. Greift erst im Sommer wenn
    climate.ac wieder erreichbar ist.
  mode: single
  triggers:
  - trigger: state
    entity_id: binary_sensor.fenster_tueren_ohne_arbeitszimmer
    to: 'on'
    for: "00:00:30"
  conditions:
  - condition: template
    value_template: "{{ has_value('climate.ac') and is_state('climate.ac', 'cool') }}"
  actions:
  - action: climate.set_hvac_mode
    data:
      hvac_mode: fan_only
    target:
      entity_id: climate.ac
    continue_on_error: true
  - delay: 00:00:02
  - action: climate.set_fan_mode
    data:
      fan_mode: silent
    target:
      entity_id: climate.ac
    continue_on_error: true
  - action: persistent_notification.create
    data:
      notification_id: ac_fenster_stop
      title: "Klimaanlage auf Umluft"
      message: "Fenster oder Tuer wurde geoeffnet, AC kuehlt nicht mehr und laeuft nur als Ventilator."

- id: ac_override_detection
  alias: "Klima » AC Override-Erkennung"
  description: >
    Erkennt manuelle AC-Aenderungen (HA-UI, HomeKit, IR-Fernbedienung) und
    aktiviert den Override fuer 2h, damit "Helper » AC manual" die Einstellung
    nicht ueberschreibt. Geraete-Echo nach einem Automations-Befehl wird per
    Zeitfenster (30s) gegen last_triggered der schreibenden Automationen
    gefiltert. current_temperature-Updates loesen nichts aus.
  mode: single
  triggers:
  - trigger: state
    entity_id: climate.ac
  conditions:
  # Steuer-Attribut hat sich geaendert (nicht nur current_temperature), und die
  # Aenderung kam nicht direkt aus einer Automation (parent_id gesetzt).
  - condition: template
    value_template: >-
      {{ trigger.from_state is not none
         and trigger.to_state is not none
         and trigger.from_state.state not in ['unavailable', 'unknown']
         and trigger.to_state.state not in ['unavailable', 'unknown']
         and trigger.to_state.context.parent_id is none
         and (
           trigger.from_state.state != trigger.to_state.state
           or trigger.from_state.attributes.get('temperature')
              != trigger.to_state.attributes.get('temperature')
           or trigger.from_state.attributes.get('fan_mode')
              != trigger.to_state.attributes.get('fan_mode')
           or trigger.from_state.attributes.get('preset_mode')
              != trigger.to_state.attributes.get('preset_mode')
         ) }}
  # Echo-Guard: keine AC-schreibende Automation lief in den letzten 180s.
  # Midea meldet den Zustand verzoegert (~2min) zurueck, sonst gilt das
  # Geraete-Echo faelschlich als manuelle Aenderung.
  - condition: template
    value_template: >-
      {% set t1 = state_attr('automation.helper_ac_manual', 'last_triggered') %}
      {% set t2 = state_attr('automation.klima_ac_stop_bei_fenster_offen', 'last_triggered') %}
      {{ (t1 is none or (now() - t1).total_seconds() > 180)
         and (t2 is none or (now() - t2).total_seconds() > 180) }}
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.ac_override
  - action: timer.start
    target:
      entity_id: timer.ac_override
  - action: logbook.log
    data:
      name: "AC Override"
      message: "Manuelle AC-Aenderung erkannt - Automatik pausiert (2h)"
      domain: climate

- id: ac_override_reset
  alias: "Klima » AC Override zurücksetzen"
  description: "Setzt den AC-Override zurueck nach Timer-Ablauf oder wenn alle weg sind."
  mode: single
  triggers:
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.ac_override
  - trigger: state
    entity_id: input_boolean.alle_sind_weg
    to: 'on'
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.ac_override
  - action: timer.cancel
    target:
      entity_id: timer.ac_override
