# Climate - Rollos.Yaml
# Generated by automation splitter - 1 automations
# Part of Home Assistant configuration

- id: '1692259868217'
  alias: Rollos » All in one (Optimiert)
  description: 'Intelligente Rollosteuerung basierend auf: - Sonnenelevation (Tageslicht)
    - Sonnenstand (Azimuth & Elevation) - Temperaturvorhersage - Anwesenheit'
  triggers:
  - id: morgens
    platform: numeric_state
    entity_id: sun.sun
    attribute: elevation
    above: 0
  - entity_id: sensor.sun_azimuth
    above: 135
    id: sonne-suedost
    trigger: numeric_state
  - entity_id: sensor.sun_azimuth
    above: 180
    id: sonne-sued
    trigger: numeric_state
  - entity_id: sensor.sun_azimuth
    above: 225
    id: sonne-suedwest
    trigger: numeric_state
  - trigger: numeric_state
    entity_id: sun.sun
    attribute: elevation
    below: -4
    id: sonnenuntergang
  - entity_id: input_boolean.schlafenszeit
    to: 'on'
    id: schlafenszeit
    trigger: state
  conditions: []
  actions:
  - variables:
      wird_sehr_heiss: '{{ has_value(''input_boolean.heute_wird_es_sehr_heiss_werden'') and is_state(''input_boolean.heute_wird_es_sehr_heiss_werden'',
        ''on'') }}'
      wird_heiss: '{{ has_value(''input_boolean.heute_wird_es_heiss_werden'') and is_state(''input_boolean.heute_wird_es_heiss_werden'', ''on'')
        }}'
      position_arbeit: 1
      position_west: "{% if wird_sehr_heiss %}0{% elif wird_heiss %}10{% else %}100{% endif %}"
  - choose:
    # Morgens: Kinderzimmer + Schlafzimmer (= cover.aqara_cover_01, Bett-Raum)
    # voll auf. Das Buero (Alex, = cover.aqara_cover_03) bleibt zu und wird nur
    # noch manuell geoeffnet.
    - conditions:
      - condition: trigger
        id: morgens
      sequence:
      - action: cover.open_cover
        target:
          entity_id:
          - cover.aqara_cover_02
          - cover.aqara_cover_01
      - action: logbook.log
        data:
          name: Rollos Morgen
          message: 'KZ + Schlafzimmer voll offen. Buero (Alex) bleibt zu, nur manuell.'
          domain: cover
    - conditions:
      - condition: trigger
        id: sonne-sued
      sequence:
      - action: cover.open_cover
        target:
          entity_id: cover.rollos_sonnenaufgang
      - if:
        - condition: template
          value_template: '{{ wird_sehr_heiss or wird_heiss }}'
        then:
        # Nur Wohnzimmer als West-Hitzeschutz. Balkon und Kueche bleiben offen (Tageslicht).
        - action: cover.set_cover_position
          data:
            position: '{{ position_west }}'
          target:
            entity_id:
            - cover.aqara_cover_04
          continue_on_error: true
    - conditions:
      - condition: trigger
        id:
        - sonnenuntergang
        - schlafenszeit
      sequence:
      - action: cover.close_cover
        target:
          entity_id:
          - cover.rollos_sonnenaufgang
          - cover.aqara_cover_03
        data: {}
      - action: cover.open_cover
        target:
          entity_id:
          - cover.rollo_balkon
          - cover.rollo_kueche
          - cover.aqara_cover_04
        data: {}
  mode: restart
