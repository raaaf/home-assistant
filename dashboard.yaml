        layout: horizontal
        icon: mdi:radiator
        icon_color: red
      - type: custom:mushroom-entity-card
        entity: sensor.heizung_badezimmer_an
        name: Badezimmer
        layout: horizontal
        icon: mdi:radiator
        icon_color: red
    - type: custom:mushroom-title-card
      title: Energie heute
      alignment: center
    - type: custom:mushroom-template-card
      primary: '{{ states(''sensor.verbrauch_heute'')|float(0)|round(1) }} kWh'
