- title: Statistik
  path: graphs
  theme: Backend-selected
  type: custom:layout-card
  layout_type: custom:grid-layout
  layout_options:
    grid-template-columns: auto 1000px auto
    grid-template-rows: auto
    grid-template-areas: '"left middle right"

      '
  badges: []
  cards:
  - type: custom:gap-card
    view_layout:
      grid:area: left
  - type: vertical-stack
    view_layout:
      grid:area: middle
    cards:
    - type: custom:mushroom-title-card
      alignment: center
      title: Statistik
    - type: custom:mushroom-chips-card
      alignment: center
      chips:
      - type: template
        content: '{% set s = states(''sensor.stromzahler_saldiert'')|float(0) %}{% if s<-50 %}↑ {{(s|abs)|round(0)}} W{% elif s>50 %}↓ {{s|round(0)}} W{% else %}{{s|round(0)}} W{% endif %}'
        icon: '{% set s = states(''sensor.stromzahler_saldiert'')|float(0) %}{% if s<-50 %}mdi:transmission-tower-export{% elif s>50 %}mdi:transmission-tower-import{% else %}mdi:transmission-tower{% endif %}'
        icon_color: '{% set s = states(''sensor.stromzahler_saldiert'')|float(0) %}{% if s<-50 %}green{% elif s>2000 %}red{% elif s>500 %}amber{% else %}grey{% endif %}'
        entity: sensor.stromzahler_saldiert
      - type: template
        content: '{{ states(''sensor.aqara_plug_02_power'')|float(0)|round(0) }} W'
        icon: mdi:solar-power
        icon_color: amber
        entity: sensor.aqara_plug_02_power
      - type: template
        content: '{{ states(''sensor.hausverbrauch_gesamt'')|float(0)|round(0) }} W'
        icon: mdi:home-lightning-bolt
        icon_color: blue
        entity: sensor.hausverbrauch_gesamt
    - type: custom:mushroom-title-card
      title: Strom
      alignment: center
    - type: grid
      square: false
      columns: 2
      cards:
      - type: custom:mini-graph-card
        name: Erzeugung
        icon: mdi:solar-power
        hours_to_show: 24
        points_per_hour: 2
        line_width: 2
        entities:
        - entity: sensor.inverter_port_1_dc_power
          name: Panel 1
          color: '#f9a825'
        - entity: sensor.inverter_port_2_dc_power
          name: Panel 2
          color: '#fbc02d'
        - entity: sensor.aqara_plug_02_power
          name: BKK
          color: '#43a047'
        show:
          legend: true
      - type: custom:mini-graph-card
        name: Netz
        icon: mdi:transmission-tower
        hours_to_show: 24
        points_per_hour: 2
        line_width: 2
        entities:
        - entity: sensor.stromzahler_saldiert
          name: Saldiert
          color: '#90a4ae'
        - entity: sensor.netzbezug
          name: Bezug
          color: '#e53935'
        - entity: sensor.einspeisung
          name: Einspeisung
          color: '#43a047'
        show:
          legend: true
    - type: custom:mini-graph-card
      name: Hausverbrauch & Phasen
      icon: mdi:home-lightning-bolt
      hours_to_show: 24
      points_per_hour: 2
      line_width: 2
      entities:
      - entity: sensor.hausverbrauch_gesamt
        name: Gesamt
        color: '#1e88e5'
      - entity: sensor.strommesser_phase_a_active_power
        name: Phase 1
      - entity: sensor.strommesser_phase_b_active_power
        name: Phase 2
      - entity: sensor.strommesser_phase_c_active_power
        name: Phase 3
      show:
        legend: true
    - type: custom:mini-graph-card
      name: Geräte
      icon: mdi:power-plug
      hours_to_show: 24
      points_per_hour: 2
      line_width: 2
      entities:
      - entity: sensor.aqara_plug_01_power
        name: Rafael
      - entity: sensor.neo_plug_01_device_power
        name: Alex
      - entity: sensor.trockner_current_consumption
        name: Trockner
      - entity: sensor.wohnzimmer_steckdose_power
        name: Wohnzimmer
      - entity: sensor.steckdose_kuechengeraete_power
        name: Küche
      - entity: sensor.steckdose_waschmaschine_power
        name: Waschm.
      - entity: sensor.neo_plug_02_power
        name: Kinderzimmer
      show:
        legend: true
    - type: grid
      square: false
      columns: 2
      cards:
      - type: custom:mushroom-entity-card
        entity: sensor.inverter_port_1_dc_daily_energy
        name: Panel 1 heute
        icon: mdi:solar-power
        icon_color: amber
        layout: horizontal
      - type: custom:mushroom-entity-card
        entity: sensor.inverter_port_2_dc_daily_energy
        name: Panel 2 heute
        icon: mdi:solar-power
        icon_color: amber
        layout: horizontal
      title: Solar heute
    - type: custom:mushroom-title-card
      title: Temperatur und Luftfeuchtigkeit
      alignment: center
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:mushroom-template-card
        primary: Aussen
        secondary: '{{ states(''sensor.temperatur_aussen'') | float(0) | round(1) }} °C · {{ states(''sensor.luftfeuchtigkeit_aussen'') | float(0) | round(0) }} %'
        icon: mdi:sun-thermometer-outline
        icon_color: blue
      - type: custom:mushroom-template-card
        primary: Wohnzimmer
        secondary: '{{ states(''sensor.wohnzimmer_temperatur'') | float(0) | round(1) }} °C · {{ states(''sensor.wohnzimmer_luftfeuchtigkeit'') | float(0) | round(0) }} %'
        icon: mdi:sofa-outline
        icon_color: orange
      - type: custom:mushroom-template-card
        primary: Schlafzimmer
        secondary: '{{ states(''sensor.aqara_climate_04_temperature'') | float(0) | round(1) }} °C · {{ states(''sensor.aqara_climate_04_humidity'') | float(0) | round(0) }} %'
        icon: mdi:bed-outline
        icon_color: indigo
