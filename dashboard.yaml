- title: Prusa MK4
  path: prusa-mk4
  theme: Backend-selected
  type: custom:layout-card
  layout_type: custom:grid-layout
  layout_options:
    grid-template-columns: auto 1000px auto
    grid-template-rows: auto
    grid-template-areas: '"left middle right"

      '
  badges: []
  cards:
  - type: custom:gap-card
    view_layout:
      grid:area: left
  - type: vertical-stack
    view_layout:
      grid:area: middle
    cards:
    - type: custom:mushroom-title-card
      alignment: center
      title: Prusa MK4
    - type: custom:mushroom-chips-card
      alignment: center
      chips:
      - type: entity
        entity: sensor.prusa_mk4
      - type: template
        content: '{{ states(''sensor.prusa_mk4_progress'')|float(0)|round(0) }} %'
        icon: mdi:printer-3d-nozzle
        icon_color: blue
        entity: sensor.prusa_mk4_progress
    - type: custom:mushroom-template-card
      primary: Prusa MK4
      secondary: '{% if is_state(''sensor.prusa_mk4'',''printing'') %}{{ states(''sensor.prusa_mk4_progress'')|round(0) }}% · {{ states(''sensor.prusa_mk4_filename'') }}{% else %}{{ states(''sensor.prusa_mk4'') }}{% endif %}'
      icon: mdi:printer-3d-nozzle
      multiline_secondary: true
      entity: sensor.prusa_mk4
      tap_action:
        action: more-info
      icon_color: '{% set s=states(''sensor.prusa_mk4'') %}{% if s==''printing'' %}blue{% elif s in [''idle'',''finished''] %}green{% elif s in [''error'',''attention'',''stopped''] %}red{% else %}grey{% endif %}'
    - type: gauge
      entity: sensor.prusa_mk4_progress
      name: Fortschritt
      min: 0
      max: 100
      needle: false
      severity:
        red: 0
        yellow: 40
        green: 80
    - type: custom:mushroom-chips-card
      alignment: center
      chips:
      - type: template
        icon: mdi:printer-3d-nozzle-heat
        content: '{{ states(''sensor.prusa_mk4_nozzle_temperature'')|round(0) }}/{{ states(''sensor.prusa_mk4_nozzle_target_temperature'')|round(0) }} °C'
      - type: template
        icon: mdi:heating-coil
        content: '{{ states(''sensor.prusa_mk4_heatbed_temperature'')|round(0) }}/{{ states(''sensor.prusa_mk4_heatbed_target_temperature'')|round(0) }} °C'
      - type: template
        icon: mdi:speedometer
        content: '{{ states(''sensor.prusa_mk4_print_speed'') }}%'
      - type: conditional
        conditions:
        - condition: state
          entity: sensor.prusa_mk4
          state: printing
        chip:
          type: template
          icon: mdi:timer-outline
          content: '{% set t=(as_timestamp(states(''sensor.prusa_mk4_print_finish''))-as_timestamp(now()))|int(0) %}{% if t<60 %}<1 min{% else %}{{ t//3600 }}h {{ (t%3600)//60 }}m{% endif %}'
    - type: custom:mushroom-chips-card
      alignment: center
      chips:
      - type: entity
        entity: button.prusa_mk4_pause_job
        icon: mdi:pause
        content_info: none
        tap_action:
          action: toggle
      - type: entity
        entity: button.prusa_mk4_resume_job
        icon: mdi:play
        content_info: none
        tap_action:
          action: toggle
      - type: entity
        entity: button.prusa_mk4_cancel_job
        icon: mdi:stop
        content_info: none
        tap_action:
          action: toggle
    - type: entities
      title: Druck
      state_color: true
      entities:
      - entity: sensor.prusa_mk4
        name: Status
      - entity: sensor.prusa_mk4_filename
        name: Datei
      - entity: sensor.prusa_mk4_material
        name: Material
      - entity: sensor.prusa_mk4_print_start
        name: Start
      - entity: sensor.prusa_mk4_print_finish
        name: Voraussichtlich fertig
      - entity: sensor.prusa_mk4_hotend_fan
        name: Hotend-Lüfter
    - type: entities
      title: Strom & Schutz
      state_color: true
      entities:
      - entity: switch.arbeitszimmer_prusa_mk4_pc_rafael
        name: Steckdose
      - entity: sensor.arbeitszimmer_prusa_mk4_power
        name: Leistung
      - entity: sensor.arbeitszimmer_prusa_mk4_energy
        name: Energie gesamt
      - entity: binary_sensor.arbeitszimmer_prusa_mk4_overheating
        name: Überhitzung
      - entity: binary_sensor.arbeitszimmer_prusa_mk4_overpowering
        name: Überlast
      - entity: button.arbeitszimmer_prusa_mk4_restart
        name: Steckdose neustarten
