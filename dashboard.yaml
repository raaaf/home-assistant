      - type: custom:mushroom-template-card
        primary: Badezimmer
        secondary: '{{ states(''sensor.aqara_climate_02_temperature'') | float(0) | round(1) }} °C · {{ states(''sensor.aqara_climate_02_humidity'') | float(0) | round(0) }} %'
        icon: mdi:shower
        icon_color: cyan
    - type: custom:mushroom-title-card
      title: Heizung
      alignment: center
    - type: grid
      square: false
      columns: 2
      cards:
      - type: custom:mushroom-entity-card
        entity: sensor.heizung_wohnzimmer_an
        name: Wohnzimmer
        layout: horizontal
        icon: mdi:radiator
        icon_color: red
      - type: custom:mushroom-entity-card
        entity: sensor.heizung_flur_an
        name: Flur
        layout: horizontal
        icon: mdi:radiator
        icon_color: red
      - type: custom:mushroom-entity-card
        entity: sensor.heizung_kinderzimmer_an
        name: Kinderzimmer
        layout: horizontal
        icon: mdi:radiator
        icon_color: red
      - type: custom:mushroom-entity-card
        entity: sensor.heizung_schlafzimmer_an
