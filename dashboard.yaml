views:
- theme: Backend-selected
  title: Home
  id: home
  type: custom:layout-card
  layout_type: custom:grid-layout
  layout_options:
    grid-template-columns: 10% 80% 10%
    grid-template-rows: auto
    grid-template-areas: '"left middle right"

      '
  badges: []
  cards:
  - type: custom:gap-card
    view_layout:
      grid:area: left
  - type: custom:layout-card
    view_layout:
      grid:area: middle
    layout_type: custom:masonry-layout
    layout:
      max_width: 1000
      width: 400
    cards:
    - type: custom:mushroom-title-card
      alignment: center
      title: "{% set time = now().hour %}\n{% if (time >= 18) %}\n Guten Abend, {{user}}!\n{% elif (time >= 12) %}\n Guten Nachmittag, {{user}}!\n{% elif (time >= 5) %}\n Guten Morgen, {{user}}!\n{% else %}\n Hallo, {{user}}\n{% endif %}"
      subtitle: Batzabutza
    - type: custom:mushroom-chips-card
      alignment: center
      chips:
      - type: entity
        entity: sensor.temperatur_aussen
      - type: entity
        entity: sensor.what_to_wear_outside
        icon: mdi:tshirt-v
      - type: entity
        entity: sensor.sunlight_pct
        icon: mdi:sunglasses
      - type: entity
        entity: sensor.night_state
        icon: mdi:weather-night
      - type: entity
        entity: sensor.ikea_motion_03_illuminance
      - type: entity
        entity: sensor.season
      - type: entity
        entity: person.rafael
        use_entity_picture: true
      - type: entity
        entity: person.alex
        use_entity_picture: true
      - type: entity
        entity: vacuum.s7_maxv
      - type: entity
        entity: sensor.count_lights_on
      - type: conditional
        conditions:
        - entity: sensor.stromzahler_saldiert
          state_not: unavailable
        - entity: sensor.stromzahler_saldiert
          state_not: unknown
        chip:
          type: template
          entity: sensor.stromzahler_saldiert
          icon: "{% set s = states('sensor.stromzahler_saldiert') | float(0) %} {% if s < -50 %}\n  mdi:transmission-tower-export\n{% elif s > 50 %}\n  mdi:transmission-tower-import\n{% else %}\n  mdi:transmission-tower\n{% endif %}"
          icon_color: "{% set s = states('sensor.stromzahler_saldiert') | float(0) %} {% if s < -50 %}\n  green\n{% elif s > 2000 %}\n  red\n{% elif s > 500 %}\n  amber\n{% else %}\n  grey\n{% endif %}"
          content: "{% set s = states('sensor.stromzahler_saldiert') | float(0) %} {% if s < -50 %}\n  ↑ {{ (s | abs) | round(0) }} W\n{% elif s > 50 %}\n  ↓ {{ s | round(0) }} W\n{% else %}\n  {{ s | round(0) }} W\n{% endif %}"
      - type: conditional
        conditions:
        - entity: sensor.aqara_plug_02_power
          state_not: unavailable
        - entity: sensor.aqara_plug_02_power
          state_not: unknown
        - condition: template
          value: '{{ states(''sensor.aqara_plug_02_power'') | float(0) > 5 }}'
        chip:
          type: template
          entity: sensor.aqara_plug_02_power
          icon: mdi:solar-power
          icon_color: "{% set pv = states('sensor.aqara_plug_02_power') | float(0) %} {% if pv > 150 %}\n  amber\n{% else %}\n  blue\n{% endif %}"
          content: '{{ states(''sensor.aqara_plug_02_power'') | float(0) | round(0) }} W'
      - type: conditional
        conditions:
        - condition: numeric_state
          entity: sensor.qingping_air_monitor_lite_co2_carbon_dioxide
          above: 1200
        chip:
          type: template
          icon: mdi:molecule-co2
          icon_color: red
          content: '{{states(''sensor.qingping_air_monitor_lite_co2_carbon_dioxide'')}}'
          entity: sensor.qingping_air_monitor_lite_co2_carbon_dioxide
      - type: conditional
        conditions:
        - entity: switch.sonoff_switch_01
          state: 'on'
        chip:
          type: template
          icon: mdi:heating-coil
          icon_color: red
          content: Badezimmer
          entity: switch.sonoff_switch_01
      - type: conditional
        conditions:
        - entity: climate.ac
          state: cool
        - entity: climate.ac
          state_not: unavailable
        - entity: climate.ac
          state_not: unknown
        chip:
          type: template
          icon: mdi:tailwind
          icon_color: blue
          content: Klimaanlage
          entity: climate.ac
      - type: conditional
        conditions:
        - entity: switch.sonoff_switch_04
          state: 'on'
        chip:
          type: template
          icon: mdi:heating-coil
          icon_color: red
          content: Schlafzimmer
          entity: switch.sonoff_switch_04
      - type: conditional
        conditions:
        - entity: switch.sonoff_switch_05
          state: 'on'
        chip:
          type: template
          icon: mdi:heating-coil
          icon_color: red
          content: Wohnzimmer
          entity: switch.sonoff_switch_05
      - type: conditional
        conditions:
        - entity: switch.sonoff_switch_02
          state: 'on'
        chip:
          type: template
          icon: mdi:heating-coil
          icon_color: red
          content: Flur
          entity: switch.sonoff_switch_02
      - type: conditional
        conditions:
        - entity: switch.sonoff_switch_03
          state: 'on'
        chip:
          type: template
          icon: mdi:heating-coil
          icon_color: red
          content: Kinderzimmer
          entity: switch.sonoff_switch_03
      - type: conditional
        conditions:
        - entity: fan.kinderzimmer
          state: 'on'
        - entity: fan.kinderzimmer
          state_not: unavailable
        - entity: fan.kinderzimmer
          state_not: unknown
        chip:
          type: template
          icon: mdi:fan-auto
          content: Ventilator KZ
          entity: fan.kinderzimmer
      - type: conditional
        conditions:
        - entity: fan.schlafzimmer
          state: 'on'
        - entity: fan.schlafzimmer
          state_not: unavailable
        - entity: fan.schlafzimmer
          state_not: unknown
        chip:
          type: template
          icon: mdi:fan-auto
          content: Ventilator SZ
          entity: fan.schlafzimmer
      - type: conditional
        conditions:
        - entity: switch.luefter_badezimmer
          state: 'on'
        chip:
          type: template
          icon: mdi:fan-auto
          content: Badezimmer
          entity: switch.luefter_badezimmer
      - type: conditional
        conditions:
        - entity: fan.zhimi_vb4_bce4_air_purifier
          state: 'on'
        chip:
          type: template
          icon: mdi:fan-auto
          content: Luftreiniger WZ
          entity: fan.zhimi_vb4_bce4_air_purifier
      - type: conditional
        conditions:
        - entity: lock.nuki_wohnungstur_lock
          state: unlocked
        chip:
          type: template
          icon: mdi:door-open
          icon_color: yellow
          content: Wohnungstür aufgeschlossen
          entity: lock.nuki_wohnungstur_lock
      - type: conditional
        conditions:
        - entity: binary_sensor.aqara_contact_07
          state: 'on'
        chip:
          type: template
          icon: mdi:door-open
          icon_color: yellow
          content: Büro
      - type: conditional
        conditions:
        - entity: binary_sensor.aqara_contact_08
          state: 'on'
        chip:
          type: template
          icon: mdi:door-open
          icon_color: yellow
          content: Wohnzimmer
      - type: conditional
        conditions:
        - entity: binary_sensor.aqara_contact_06
          state: 'on'
        chip:
          type: template
          icon: mdi:door-open
          icon_color: yellow
          content: Küche
      - type: conditional
        conditions:
        - entity: binary_sensor.aqara_contact_02
          state: 'on'
        chip:
          type: template
          icon: mdi:door-open
          icon_color: yellow
          content: Balkon
      - type: conditional
        conditions:
        - entity: binary_sensor.aqara_contact_04
          state: 'on'
        chip:
          type: template
          icon: mdi:door-open
          icon_color: red
          content: Wohnungstür ist offen!
      - type: conditional
        conditions:
        - entity: binary_sensor.aqara_contact_01
          state: 'on'
        chip:
          type: template
          icon: mdi:door-open
          icon_color: yellow
          content: Schlafzimmer
      - type: conditional
        conditions:
        - entity: binary_sensor.aqara_contact_05
          state: 'on'
        chip:
          type: template
          icon: mdi:door-open
          icon_color: yellow
          content: Kinderzimmer
      - type: conditional
        conditions:
        - entity: input_select.waschmaschine
          state: Arbeitet
        chip:
          type: template
          icon: mdi:washing-machine
          content: WaMa arbeitet
      - type: conditional
        conditions:
        - entity: input_select.waschmaschine
          state: Fertig
        chip:
          type: template
          icon: mdi:washing-machine
          content: WaMa fertig
      - type: conditional
        conditions:
        - entity: input_select.trockner
          state: Arbeitet
        chip:
          type: template
          icon: mdi:tumble-dryer
          content: Trockner arbeitet
      - type: conditional
        conditions:
        - entity: input_select.trockner
          state: Fertig
        chip:
          type: template
          icon: mdi:tumble-dryer
          content: Trockner fertig
      - type: conditional
        conditions:
        - entity: sensor.192_168_178_118_queue_count
          state_not: unavailable
        - entity: sensor.192_168_178_118_queue_count
          state_not: unknown
        - condition: numeric_state
          entity: sensor.192_168_178_118_queue_count
          above: 0
        chip:
          type: template
          entity: sensor.192_168_178_118_speed
          icon: mdi:download
          icon_color: amber
          content: '{{ states(''sensor.192_168_178_118_speed'') }} MB/s'
  - type: custom:gap-card
    view_layout:
      grid:area: right
  - type: custom:gap-card
    view_layout:
      grid:area: left
  - type: custom:layout-card
    view_layout:
      grid:area: middle
    layout_type: custom:masonry-layout
    layout:
      max_width: 1000
      width: 400
    cards:
    - type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr))
        grid-auto-flow: row dense
        grid-gap: 16px
      cards:
      - square: false
        columns: 2
        type: grid
        title: Müllabfuhr
        cards:
        - type: entity
          entity: sensor.restmuell
          state_color: true
        - type: entity
          entity: sensor.bioabfall
          state_color: true
        - type: entity
          entity: sensor.altpapier
          state_color: true
          icon: mdi:delete-empty
        - type: entity
          entity: sensor.gelbersack
          state_color: true
          icon: mdi:delete-variant
      - type: grid
        title: Waschmaschine & Trockner
        square: false
        columns: 2
        cards:
        - type: custom:mushroom-entity-card
          entity: input_select.waschmaschine
          layout: vertical
          name: Status
        - type: custom:mushroom-entity-card
          entity: input_select.trockner
          layout: vertical
          name: Status
        - type: custom:mushroom-entity-card
          entity: switch.steckdose_waschmaschine
          name: Waschmaschine
          layout: vertical
        - type: custom:mushroom-entity-card
          entity: switch.trockner
          layout: vertical
      - type: grid
        title: Energiekosten
        square: false
        columns: 3
        cards:
        - type: custom:mushroom-entity-card
          entity: sensor.stromkosten_heute
          name: Heute
          icon_color: amber
          layout: vertical
        - type: custom:mushroom-entity-card
          entity: sensor.solar_ersparnis_heute
          name: Solar-Ersparnis
          icon_color: green
          layout: vertical
        - type: custom:mushroom-entity-card
          entity: sensor.stromkosten_monat_geschatzt
          name: Monat (geschätzt)
          icon_color: deep-orange
          layout: vertical
      - type: grid
        title: Heizung
        square: false
        columns: 2
        cards:
        - type: custom:mushroom-template-card
          primary: Heizung Boost
          secondary: '{{ ''Aktiv'' if is_state(''timer.heizung_boost'', ''active'') else ''1,5h Boost starten'' }}'
          icon: mdi:radiator
          icon_color: '{{ ''red'' if is_state(''timer.heizung_boost'', ''active'') else ''grey'' }}'
          tap_action:
            action: perform-action
            perform_action: script.heizung_boost
          layout: horizontal
        - type: custom:mushroom-entity-card
          entity: switch.sonoff_switch_03
          name: Kinderzimmer
          layout: horizontal
          icon: mdi:heating-coil
          icon_color: red
        - type: custom:mushroom-entity-card
          entity: switch.sonoff_switch_04
          name: Schlafzimmer
          layout: horizontal
          icon: mdi:heating-coil
          icon_color: red
        - type: custom:mushroom-entity-card
          entity: switch.sonoff_switch_05
          name: Wohnzimmer
          layout: horizontal
          icon: mdi:heating-coil
          icon_color: red
        - type: custom:mushroom-entity-card
          entity: switch.sonoff_switch_02
          name: Flur
          layout: horizontal
          icon: mdi:heating-coil
          icon_color: red
        - type: custom:mushroom-entity-card
          entity: switch.sonoff_switch_01
          name: Badezimmer
          layout: horizontal
          icon: mdi:heating-coil
          icon_color: red
      - type: grid
        title: Fenster / Türen
        square: false
        columns: 2
        cards:
        - type: custom:mushroom-entity-card
          entity: binary_sensor.aqara_contact_05
          name: Kinderzimmer
          layout: horizontal
          icon: mdi:door-open
        - type: custom:mushroom-entity-card
          entity: binary_sensor.aqara_contact_04
          name: Haustür
          layout: horizontal
          icon: mdi:door-open
        - type: custom:mushroom-entity-card
          entity: binary_sensor.aqara_contact_02
          name: Balkon
          layout: horizontal
          icon: mdi:door-open
        - type: custom:mushroom-entity-card
          entity: binary_sensor.aqara_contact_06
          name: Küche
          layout: horizontal
          icon: mdi:door-open
        - type: custom:mushroom-entity-card
          entity: binary_sensor.aqara_contact_07
          name: Büro (Alex)
          layout: horizontal
          icon: mdi:door-open
        - type: custom:mushroom-entity-card
          entity: binary_sensor.aqara_contact_01
          name: Schlafzimmer (Bett)
          layout: horizontal
          icon: mdi:door-open
        - type: custom:mushroom-entity-card
          entity: binary_sensor.aqara_contact_08
          name: Fenster
          layout: horizontal
          icon: mdi:door-open
      - type: grid
        title: Steckdosen
        square: false
        columns: 2
        cards:
        - type: custom:mushroom-entity-card
          entity: switch.wohnzimmer_steckdose
          name: Wohnzimmer TV
          layout: horizontal
        - type: custom:mushroom-entity-card
          entity: switch.steckdose_kuechengeraete
          name: Thermomix
          layout: horizontal
        - type: custom:mushroom-entity-card
          entity: switch.aqara_plug_01
          name: Drucker
          layout: horizontal
        - type: custom:mushroom-entity-card
          entity: switch.kuchengerate
          name: Küchengeräte
          layout: horizontal
        - type: custom:mushroom-entity-card
          entity: switch.neo_plug_01
          name: TV Schlafzimmer (Bett)
        - type: custom:mushroom-entity-card
          entity: switch.steckdose_avr
          name: Balkon Musik
        - type: custom:mushroom-entity-card
          entity: switch.aqara_plug_02
          name: BKK
        - type: custom:mushroom-entity-card
          entity: switch.neo_plug_02
          name: Kinderzimmer
      - type: grid
        title: Rollos
        square: false
        columns: 2
        cards:
        - type: custom:mushroom-cover-card
          entity: cover.aqara_cover_01
          layout: horizontal
          name: Schlafzimmer (Bett)
        - type: custom:mushroom-cover-card
          entity: cover.aqara_cover_03
          layout: horizontal
          name: Büro (Alex)
        - type: custom:mushroom-cover-card
          entity: cover.ikea_cover_01
          layout: horizontal
          name: Badezimmer
        - type: custom:mushroom-cover-card
          entity: cover.aqara_cover_02
          layout: horizontal
          name: Kinderzimmer
        - type: custom:mushroom-cover-card
          entity: cover.rollo_balkon
          layout: horizontal
          name: Balkon
        - type: custom:mushroom-cover-card
          entity: cover.rollo_kueche
          layout: horizontal
          name: Küche
        - type: custom:mushroom-cover-card
          entity: cover.aqara_cover_04
          layout: horizontal
          name: Wohnzimmer
  - type: custom:gap-card
    view_layout:
      grid:area: right
- title: Lichter
  theme: Backend-selected
  type: custom:layout-card
  layout_type: custom:grid-layout
  layout_options:
    grid-template-columns: auto 1000px auto
    grid-template-rows: auto
    grid-template-areas: '"left middle right"

      '
  badges: []
  cards:
  - type: custom:gap-card
    view_layout:
      grid:area: left
  - type: vertical-stack
    view_layout:
      grid:area: middle
    cards:
    - type: custom:mushroom-title-card
      alignment: center
      title: Lichter
    - type: custom:mushroom-chips-card
      alignment: center
      chips:
      - type: template
        content: '{{ states(''sensor.count_lights_on'') }} an'
        icon: mdi:lightbulb-group
        icon_color: amber
        entity: sensor.count_lights_on
      - type: conditional
        conditions:
        - entity: light.alle_wohnzimmer_lichter
          state: 'on'
        chip:
          type: entity
          entity: light.alle_wohnzimmer_lichter
          content_info: name
          name: Wohnzimmer
      - type: conditional
        conditions:
        - entity: light.alle_kuche_lichter
          state: 'on'
        chip:
          type: entity
          entity: light.alle_kuche_lichter
          content_info: name
          name: Küche
      - type: conditional
        conditions:
        - entity: light.alle_schlafzimmer_lichter
          state: 'on'
        chip:
          type: entity
          entity: light.alle_schlafzimmer_lichter
          content_info: name
          name: Arbeitszimmer Alex
      - type: conditional
        conditions:
        - entity: light.alle_arbeitszimmer_lichter
          state: 'on'
        chip:
          type: entity
          entity: light.alle_arbeitszimmer_lichter
          content_info: name
          name: Schlafzimmer
      - type: conditional
        conditions:
        - entity: light.alle_kinderzimmer_lichter
          state: 'on'
        chip:
          type: entity
          entity: light.alle_kinderzimmer_lichter
          content_info: name
          name: Kinderzimmer
      - type: conditional
        conditions:
        - entity: light.alle_badezimmer_lichter
          state: 'on'
        chip:
          type: entity
          entity: light.alle_badezimmer_lichter
          content_info: name
          name: Bad
      - type: conditional
        conditions:
        - entity: light.alle_flur_lichter
          state: 'on'
        chip:
          type: entity
          entity: light.alle_flur_lichter
          content_info: name
          name: Flur
      - type: conditional
        conditions:
        - entity: light.alle_balkon_lichter
          state: 'on'
        chip:
          type: entity
          entity: light.alle_balkon_lichter
          content_info: name
          name: Balkon
      - type: conditional
        conditions:
        - entity: light.alle_ankleide_lichter
          state: 'on'
        chip:
          type: entity
          entity: light.alle_ankleide_lichter
          content_info: name
          name: Ankleide
      - type: conditional
        conditions:
        - entity: light.alle_waschzimmer_lichter
          state: 'on'
        chip:
          type: entity
          entity: light.alle_waschzimmer_lichter
          content_info: name
          name: Wasch
    - type: custom:mushroom-chips-card
      alignment: center
      chips:
      - type: template
        entity: binary_sensor.ikea_motion_01_occupancy
        icon: mdi:motion-sensor
        icon_color: '{{ ''red'' if is_state(''binary_sensor.ikea_motion_01_occupancy'',''on'') else ''disabled'' }}'
        content: Ankleide
        tap_action:
          action: more-info
      - type: template
        entity: binary_sensor.tuya_motion_01_presence
        icon: mdi:motion-sensor
        icon_color: '{{ ''red'' if is_state(''binary_sensor.tuya_motion_01_presence'',''on'') else ''disabled'' }}'
        content: Bad
        tap_action:
          action: more-info
      - type: template
        entity: binary_sensor.ikea_motion_03_occupancy
        icon: mdi:motion-sensor
        icon_color: '{{ ''red'' if is_state(''binary_sensor.ikea_motion_03_occupancy'',''on'') else ''disabled'' }}'
        content: Balkon
        tap_action:
          action: more-info
      - type: template
        entity: binary_sensor.flur_motion
        icon: mdi:motion-sensor
        icon_color: '{{ ''red'' if is_state(''binary_sensor.flur_motion'',''on'') else ''disabled'' }}'
        content: Flur
        tap_action:
          action: more-info
      - type: template
        entity: binary_sensor.tuya_motion_03_motion_presence
        icon: mdi:motion-sensor
        icon_color: '{{ ''red'' if is_state(''binary_sensor.tuya_motion_03_motion_presence'',''on'') else ''disabled'' }}'
        content: Wasch
        tap_action:
          action: more-info
      - type: template
        entity: binary_sensor.ikea_motion_06
        icon: mdi:motion-sensor
        icon_color: '{{ ''red'' if is_state(''binary_sensor.ikea_motion_06'',''on'') else ''disabled'' }}'
        content: Haustür
        tap_action:
          action: more-info
      - type: template
        entity: binary_sensor.ikea_motion_07
        icon: mdi:motion-sensor
        icon_color: '{{ ''red'' if is_state(''binary_sensor.ikea_motion_07'',''on'') else ''disabled'' }}'
        content: Küche
        tap_action:
          action: more-info
      - type: template
        entity: binary_sensor.ikea_motion_02
        icon: mdi:motion-sensor
        icon_color: '{{ ''red'' if is_state(''binary_sensor.ikea_motion_02'',''on'') else ''disabled'' }}'
        content: Büro
        tap_action:
          action: more-info
      - type: template
        entity: binary_sensor.tuya_motion_02_presence
        icon: mdi:motion-sensor
        icon_color: '{{ ''red'' if is_state(''binary_sensor.tuya_motion_02_presence'',''on'') else ''disabled'' }}'
        content: Kinderzimmer
        tap_action:
          action: more-info
      - type: template
        entity: binary_sensor.ikea_motion_09
        icon: mdi:motion-sensor
        icon_color: '{{ ''red'' if is_state(''binary_sensor.ikea_motion_09'',''on'') else ''disabled'' }}'
        content: Schlafzimmer
        tap_action:
          action: more-info
      - type: template
        entity: binary_sensor.ikea_motion_08
        icon: mdi:motion-sensor
        icon_color: '{{ ''red'' if is_state(''binary_sensor.ikea_motion_08'',''on'') else ''disabled'' }}'
        content: Dusche
        tap_action:
          action: more-info
      - type: template
        entity: binary_sensor.aqara_vibration_01_vibration
        icon: mdi:motion-sensor
        icon_color: '{{ ''red'' if is_state(''binary_sensor.aqara_vibration_01_vibration'',''on'') else ''disabled'' }}'
        content: Spieletisch
        tap_action:
          action: more-info
      - type: template
        entity: binary_sensor.aqara_vibration_02_vibration
        icon: mdi:motion-sensor
        icon_color: '{{ ''red'' if is_state(''binary_sensor.aqara_vibration_02_vibration'',''on'') else ''disabled'' }}'
        content: Esstisch
        tap_action:
          action: more-info
    - type: grid
      square: false
      columns: 3
      cards:
      - type: custom:mushroom-entity-card
        entity: input_boolean.baden
