# ============================================================================
# HOME ASSISTANT CORE CONFIGURATION
# ============================================================================

# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:

homeassistant:
  # Multi-Factor Authentication
  auth_mfa_modules:
    - type: totp

  # External URL for secure access
  external_url: "https://ha.rafaelalex.de"

  # Authentication providers
  auth_providers:
    - type: trusted_networks
      trusted_networks:
        - 192.168.178.0/24
        - 127.0.0.1
        - ::1
      allow_bypass_login: false
    - type: homeassistant

# ============================================================================
# NETWORK & SECURITY
# ============================================================================

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.30.33.0/24
    - 127.0.0.1
    - 192.168.178.72
    - 192.168.188.118
    - ::1
  ip_ban_enabled: false
  login_attempts_threshold: 5
  # SSL certificates (uncomment when using)
  # ssl_certificate: /ssl/fullchain.pem
  # ssl_key: /ssl/privkey.pem

# ============================================================================
# LOGGING & MONITORING
# ============================================================================

logger:
  default: error
  logs:
    homeassistant.components: warning
    homeassistant.components.http: error
    homeassistant.components.automation: info
    homeassistant.components.script: info
    homeassistant.components.template: warning
    homeassistant.components.mqtt: warning
    homeassistant.components.recorder: warning
    homeassistant.components.powercalc: info
    # Suppress noisy device connectivity errors
    homeassistant.components.media_player: error  # Suppress Denon AVR slow update warnings
    pyatv: critical  # Suppress HomePod/AirPlay connection resets
    homeassistant.components.shelly: critical  # Suppress Shelly connection errors (show only critical)
    homeassistant.components.tplink: critical  # Suppress TP-Link timeout errors (show only critical)
    homeassistant.helpers.service: critical  # Suppress vacuum coroutine warnings
    # Suppress powercalc startup errors (lights off = no brightness)
    custom_components.powercalc.strategy.lut: critical
    # Suppress transient device connectivity errors
    custom_components.xiaomi_miot: critical  # AC offline in Off-Season floods logs
    custom_components.nuki_ng: critical  # Nuki cloud 500s transient
    homeassistant.components.ipp: critical  # Printer offline floods logs

# Database optimization
recorder:
  purge_keep_days: 14
  auto_purge: true
  commit_interval: 5  # Reduced from 30 to minimize data loss on crash
  exclude:
    domains:
      - automation
      - updater
      - device_tracker
      - persistent_notification
      - script
      - media_player
    entities:
      - sensor.system_monitor_last_boot
      - sensor.date
      - sensor.date_time_iso
      - sensor.s7_maxv_status  # Excluded due to state list too long (>255 chars)
      # Exclude specific problematic energy sensors that cause utility meter errors
      - sensor.homepod_arbeitszimmer_energy
      - sensor.kamera_schlafzimmer_energy
    entity_globs:
      - sensor.*_battery_level
      - sensor.*_rssi
      - sensor.*_linkquality
      - sensor.*_power
      - sensor.*_current_consumption
      - sensor.*_voltage
      - sensor.*_current
      - sensor.s7_maxv_*
      # Exclude specific problematic utility meter sensors
      - sensor.homepod_*_energy_*
      - sensor.kamera_*_energy_*
  include:
    entities:
      # Dashboard power sensors - explicitly included for history tracking
      # Solar panels
      - sensor.inverter_port_1_dc_power  # Panel 1
      - sensor.inverter_port_2_dc_power  # Panel 2
      # Grid phases
      - sensor.strommesser_phase_a_active_power  # Phase 1
      - sensor.strommesser_phase_b_active_power  # Phase 2
      - sensor.strommesser_phase_c_active_power  # Phase 3
      # Individual device power sensors
      - sensor.aqara_plug_02_power  # BKK
      - sensor.neo_plug_01_device_power  # Alex
      - sensor.arbeitszimmer_steckdose_power  # Rafael (office)
      - sensor.trockner_current_consumption  # Trockner (dryer)
      - sensor.wohnzimmer_steckdose_power  # Wohnzimmer (living room)
      - sensor.steckdose_kuechengeraete_power  # Küchengeräte (kitchen appliances)
      - sensor.steckdose_waschmaschine_power  # Waschmaschine (washing machine)
      - sensor.neo_plug_02_power  # Kinderzimmer (kids room)
      # Aggregate power sensors
      - sensor.alle_always_on_power  # Alle Always-On
      - sensor.alle_speaker_power  # Alle Speaker
      - sensor.alle_variablen_power  # Alle Variablen

# History configuration - filtering handled by recorder configuration

# ============================================================================
# COMMUNICATION & NOTIFICATIONS
# ============================================================================

mobile_app:
cloud:

# Notifications
notify: !include notifies.yaml

# Telegram (disabled)
# telegram_bot:
#   - platform: polling
#     api_key: !secret telegram_api_key
#     allowed_chat_ids:
#       - 6310607652

# ============================================================================
# USER INTERFACE
# ============================================================================

frontend:
  themes: !include_dir_merge_named themes

# ============================================================================
# EXTERNAL INTEGRATIONS
# ============================================================================

# Waste Collection Schedule
waste_collection_schedule:
  sources:
    - name: abfallwirtschaft_fuerth_eu
      args:
        id: 102471001
      customize:
        - type: Restabfall
          alias: Restmuell
          icon: mdi:trash-can
        - type: Bioabfall
          alias: Bioabfall
          icon: mdi:recycle
        - type: Altpapier
          alias: Papier
          icon: mdi:newspaper
        - type: "Gelber Sack"
          alias: GelberSack
          icon: mdi:recycle-variant
  fetch_time: "04:00"
  day_switch_time: "10:00"

# Adaptive Lighting
adaptive_lighting: !include adaptive_lighting.yaml

# Power Calculation
powercalc:
  discovery:
    enabled: true
    exclude_device_types:
      - power_meter    # exclude devices that already measure power (Shelly, smart plugs)
  create_utility_meters: true
  utility_meter_types:
    - daily
    - weekly
    - monthly
  power_sensor_naming: "{} Power"
  power_sensor_friendly_naming: "{} Power"
  energy_sensor_naming: "{} Energy"
  energy_sensor_friendly_naming: "{} Energy"
  energy_sensor_precision: 2
  power_sensor_precision: 2
  # Throttle group sensors to reduce database writes
  group_power_update_interval: 5      # default: 2 seconds
  group_energy_update_interval: 120   # default: 60 seconds
  # Handle edge cases and errors gracefully
  disable_extended_attributes: true
  ignore_unavailable_state: true

# ============================================================================
# TEMPLATE SENSORS
# ============================================================================

template:
  # Time-based sensors
  - sensor:
      - name: "WakeUp Light Timestamp"
        unique_id: wakeup_light_timestamp
        device_class: timestamp
        state: >
          {% set target = 'input_datetime.aufwachzeit_arbeitstag' if is_state("binary_sensor.workday_sensor", "on") else 'input_datetime.aufwachzeit_freier_tag' %}
          {% set raw = states(target) %}
          {% if raw in ['unknown', 'unavailable', ''] %}
            {{ none }}
          {% else %}
            {% set parsed = as_datetime(raw, default=None) %}
            {% set time_str = parsed.strftime('%H:%M:%S') if parsed is not none else raw %}
            {{ today_at(time_str) }}
          {% endif %}
        availability: >
          {{ states('binary_sensor.workday_sensor') not in ['unknown', 'unavailable'] and
             states('input_datetime.aufwachzeit_arbeitstag') not in ['unknown', 'unavailable'] and
             states('input_datetime.aufwachzeit_freier_tag') not in ['unknown', 'unavailable'] }}

      - name: "Einschlafzeit Timestamp"
        unique_id: einschlafzeit_timestamp
        device_class: timestamp
        state: >
          {% set target = 'input_datetime.einschlafzeit_arbeitstag' if is_state("binary_sensor.tomorrow_workday_sensor", "on") else 'input_datetime.einschlafzeit_freier_tag' %}
          {% set raw = states(target) %}
          {% if raw in ['unknown', 'unavailable', ''] %}
            {{ none }}
          {% else %}
            {% set parsed = as_datetime(raw, default=None) %}
            {% set time_str = parsed.strftime('%H:%M:%S') if parsed is not none else raw %}
            {{ today_at(time_str) }}
          {% endif %}
        availability: >
          {{ states('binary_sensor.tomorrow_workday_sensor') not in ['unknown', 'unavailable'] and
             states('input_datetime.einschlafzeit_arbeitstag') not in ['unknown', 'unavailable'] and
             states('input_datetime.einschlafzeit_freier_tag') not in ['unknown', 'unavailable'] }}

  # Scene status sensors
  - sensor:
      - name: "Active Scenes"
        unique_id: active_scenes
        state: >
          {% set scenes = [
            'Film' if is_state('input_boolean.movie', 'on') else none,
            'Party' if is_state('input_boolean.party', 'on') else none,
            'Kochen' if is_state('input_boolean.kochen', 'on') else none,
            'Essen' if is_state('input_boolean.essen', 'on') else none,
            'Baden' if is_state('input_boolean.baden', 'on') else none,
            'Sauna' if is_state('input_boolean.sauna', 'on') else none,
            'Arbeit' if is_state('input_boolean.arbeit', 'on') else none,
            'Gaming' if is_state('input_boolean.gaming', 'on') else none
          ] | reject('none') | list %}
          {% if scenes | length > 0 %}
            {{ scenes | join(', ') }}
          {% else %}
            Keine
          {% endif %}
        icon: mdi:play-circle
        attributes:
          scene_count: >
            {{ [
              is_state('input_boolean.movie', 'on'),
              is_state('input_boolean.party', 'on'),
              is_state('input_boolean.kochen', 'on'),
              is_state('input_boolean.essen', 'on'),
              is_state('input_boolean.baden', 'on'),
              is_state('input_boolean.sauna', 'on'),
              is_state('input_boolean.arbeit', 'on'),
              is_state('input_boolean.gaming', 'on')
            ] | select('true') | list | length }}
          scene_list: >
            {{ [
              'Film' if is_state('input_boolean.movie', 'on') else none,
              'Party' if is_state('input_boolean.party', 'on') else none,
              'Kochen' if is_state('input_boolean.kochen', 'on') else none,
              'Essen' if is_state('input_boolean.essen', 'on') else none,
              'Baden' if is_state('input_boolean.baden', 'on') else none,
              'Sauna' if is_state('input_boolean.sauna', 'on') else none,
              'Arbeit' if is_state('input_boolean.arbeit', 'on') else none,
              'Gaming' if is_state('input_boolean.gaming', 'on') else none
            ] | reject('none') | list }}

  # Scene status binary sensors
  - binary_sensor:
      - name: "Any Scene Active"
        unique_id: any_scene_active
        device_class: running
        state: >
          {{ [
            is_state('input_boolean.movie', 'on'),
            is_state('input_boolean.party', 'on'),
            is_state('input_boolean.kochen', 'on'),
            is_state('input_boolean.essen', 'on'),
            is_state('input_boolean.baden', 'on'),
            is_state('input_boolean.sauna', 'on'),
            is_state('input_boolean.arbeit', 'on'),
            is_state('input_boolean.gaming', 'on')
          ] | select('true') | list | length > 0 }}
        availability: >
          {{ expand(['input_boolean.movie', 'input_boolean.party',
                     'input_boolean.kochen', 'input_boolean.essen',
                     'input_boolean.baden', 'input_boolean.sauna',
                     'input_boolean.arbeit', 'input_boolean.gaming'])
             | selectattr('state', 'defined') | list | length == 8 }}
        icon: >
          {% if this.state == 'on' %}
            mdi:play-circle
          {% else %}
            mdi:play-circle-outline
          {% endif %}
        attributes:
          active_scenes: "{{ states('sensor.active_scenes') }}"
          scene_count: "{{ state_attr('sensor.active_scenes', 'scene_count') }}"

      - name: "Scene Conflict Detected"
        unique_id: scene_conflict_detected
        device_class: problem
        state: >
          {% set party = is_state('input_boolean.party', 'on') %}
          {% set arbeit = is_state('input_boolean.arbeit', 'on') %}
          {% set gaming = is_state('input_boolean.gaming', 'on') %}
          {% set other_scenes = [
            is_state('input_boolean.movie', 'on'),
            is_state('input_boolean.kochen', 'on'),
            is_state('input_boolean.essen', 'on'),
            is_state('input_boolean.baden', 'on'),
            is_state('input_boolean.sauna', 'on')
          ] | select('true') | list | length > 0 %}
          {% set conflict = false %}
          {# Party conflicts with any other scene #}
          {% if party and (arbeit or gaming or other_scenes) %}
            {% set conflict = true %}
          {% endif %}
          {# Rafael kann im Schlafraum nicht gleichzeitig gamen und arbeiten (Alex sitzt im Buero) #}
          {% if gaming and is_state('binary_sensor.macbook_pro_rafael_active_2', 'on') %}
            {% set conflict = true %}
          {% endif %}
          {{ conflict }}
        availability: >
          {{ expand(['input_boolean.movie', 'input_boolean.party',
                     'input_boolean.kochen', 'input_boolean.essen',
                     'input_boolean.baden', 'input_boolean.sauna',
                     'input_boolean.arbeit', 'input_boolean.gaming'])
             | selectattr('state', 'defined') | list | length == 8 }}
        icon: >
          {% if this.state == 'on' %}
            mdi:alert-circle
          {% else %}
            mdi:check-circle
          {% endif %}
        attributes:
          active_scenes: "{{ states('sensor.active_scenes') }}"
          conflict_reason: >
            {% set party = is_state('input_boolean.party', 'on') %}
            {% set arbeit = is_state('input_boolean.arbeit', 'on') %}
            {% set gaming = is_state('input_boolean.gaming', 'on') %}
            {% set other_scenes = [
              is_state('input_boolean.movie', 'on'),
              is_state('input_boolean.kochen', 'on'),
              is_state('input_boolean.essen', 'on'),
              is_state('input_boolean.baden', 'on'),
              is_state('input_boolean.sauna', 'on')
            ] | select('true') | list | length > 0 %}
            {% if party and (arbeit or gaming or other_scenes) %}
              Party-Modus kann nicht mit anderen Szenen kombiniert werden
            {% elif gaming and is_state('binary_sensor.macbook_pro_rafael_active_2', 'on') %}
              Rafael kann im Schlafraum nicht gleichzeitig gamen und arbeiten
            {% else %}
              Kein Konflikt
            {% endif %}

  # Manual Control Sensors for Motion Bypass
  # These track when lights have been manually controlled (via Siri, app, switch)
  # Used to bypass motion-based turn-off automations
  - binary_sensor:
      - name: "Wohnzimmer Manual Control"
        unique_id: wohnzimmer_manual_control
        state: >-
          {{ (state_attr('switch.adaptive_lighting_wohnzimmer', 'manual_control') or []) | length > 0 }}
        icon: mdi:hand-back-right

      - name: "Küche Manual Control"
        unique_id: kueche_manual_control
        state: >-
          {{ (state_attr('switch.adaptive_lighting_kueche', 'manual_control') or []) | length > 0 }}
        icon: mdi:hand-back-right

      - name: "Schlafzimmer Manual Control"
        unique_id: schlafzimmer_manual_control
        state: >-
          {{ (state_attr('switch.adaptive_lighting_schlafzimmer', 'manual_control') or []) | length > 0 }}
        icon: mdi:hand-back-right

      - name: "Kinderzimmer Manual Control"
        unique_id: kinderzimmer_manual_control
        state: >-
          {{ (state_attr('switch.adaptive_lighting_kinderzimmer', 'manual_control') or []) | length > 0 }}
        icon: mdi:hand-back-right

      - name: "Badezimmer Manual Control"
        unique_id: badezimmer_manual_control
        state: >-
          {{ (state_attr('switch.adaptive_lighting_badezimmer', 'manual_control') or []) | length > 0 }}
        icon: mdi:hand-back-right

      - name: "Waschzimmer Manual Control"
        unique_id: waschzimmer_manual_control
        state: >-
          {{ (state_attr('switch.adaptive_lighting_waschzimmer', 'manual_control') or []) | length > 0 }}
        icon: mdi:hand-back-right

      - name: "Arbeitszimmer Manual Control"
        unique_id: arbeitszimmer_manual_control
        state: >-
          {{ (state_attr('switch.adaptive_lighting_arbeitszimmer', 'manual_control') or []) | length > 0 }}
        icon: mdi:hand-back-right

      - name: "Ankleide Manual Control"
        unique_id: ankleide_manual_control
        state: >-
          {{ (state_attr('switch.adaptive_lighting_ankleide', 'manual_control') or []) | length > 0 }}
        icon: mdi:hand-back-right

      - name: "Flur Manual Control"
        unique_id: flur_manual_control
        state: >-
          {{ (state_attr('switch.adaptive_lighting_flur', 'manual_control') or []) | length > 0 }}
        icon: mdi:hand-back-right

      - name: "Balkon Manual Control"
        unique_id: balkon_manual_control
        state: >-
          {{ (state_attr('switch.adaptive_lighting_balkon', 'manual_control') or []) | length > 0 }}
        icon: mdi:hand-back-right

      # Fenster/Tueren ohne Arbeitszimmer: dort haengt dauerhaft der AC-Abluftschlauch
      # im offenen Fenster. Gate fuer die AC-Steuerung, damit AZ-Fenster die AC nicht blockt.
      - name: "Fenster Tueren ohne Arbeitszimmer"
        unique_id: fenster_tueren_ohne_az
        device_class: opening
        state: >-
          {{ expand([
               'binary_sensor.aqara_contact_02',
               'binary_sensor.aqara_contact_04',
               'binary_sensor.aqara_contact_05',
               'binary_sensor.aqara_contact_06',
               'binary_sensor.aqara_contact_07',
               'binary_sensor.aqara_contact_08'
             ]) | selectattr('state', 'eq', 'on') | list | length > 0 }}
        icon: mdi:window-open-variant

      - name: "Motion Automations Disabled"
        unique_id: motion_automations_disabled
        device_class: problem
        state: >
          {{ is_state('automation.motion_kuche_2', 'off') or
             is_state('automation.motion_esstisch', 'off') or
             is_state('automation.motion_badezimmer_gross', 'off') or
             is_state('automation.ikea_motion_02_update', 'off') }}
        availability: >
          {{ expand(['automation.motion_kuche_2', 'automation.motion_esstisch',
                     'automation.motion_badezimmer_gross', 'automation.ikea_motion_02_update'])
             | selectattr('state', 'defined') | list | length == 4 }}
        icon: >
          {% if this.state == 'on' %}
            mdi:motion-sensor-off
          {% else %}
            mdi:motion-sensor
          {% endif %}
        attributes:
          disabled_count: >
            {{ [
              is_state('automation.motion_kuche_2', 'off'),
              is_state('automation.motion_esstisch', 'off'),
              is_state('automation.motion_badezimmer_gross', 'off'),
              is_state('automation.ikea_motion_02_update', 'off')
            ] | select('true') | list | length }}
          disabled_automations: >
            {{ [
              'Küche' if is_state('automation.motion_kuche_2', 'off') else none,
              'Esstisch' if is_state('automation.motion_esstisch', 'off') else none,
              'Badezimmer' if is_state('automation.motion_badezimmer_gross', 'off') else none,
              'Arbeitszimmer' if is_state('automation.ikea_motion_02_update', 'off') else none
            ] | reject('none') | list | join(', ') }}

  # Fan speed calculation sensors
  - sensor:
      - name: "Fan Speed Schlafzimmer CO2 Calculated"
        unique_id: fan_speed_schlafzimmer_co2_calculated
        icon: mdi:fan
        unit_of_measurement: "%"
        state: >-
          {% set co2 = states('sensor.qingping_air_monitor_lite_co2_carbon_dioxide') | float(0) %}
          {% set current = this.state | int(0) %}
          {% if co2 >= 2000 %} 75
          {% elif co2 >= 1500 %}
            {% if current >= 75 and co2 >= 1900 %} 75
            {% else %} 50
            {% endif %}
          {% elif co2 >= 800 %}
            {% if current >= 50 and co2 >= 1400 %} 50
            {% else %} 25
            {% endif %}
          {% elif co2 < 700 %} 0
          {% else %} {{ current }}
          {% endif %}
        availability: >-
          {{ states('sensor.qingping_air_monitor_lite_co2_carbon_dioxide') not in ['unknown', 'unavailable'] }}

      - name: "Room Temperature Average"
        unique_id: room_temperature_average
        unit_of_measurement: "°C"
        device_class: temperature
        state: >
          {% set temps = [
            states('sensor.arbeitszimmer_temperatur'),
            states('sensor.aqara_climate_03_temperature'),
            states('sensor.aqara_climate_02_temperature'),
            states('sensor.qingping_air_monitor_lite_temperature')
          ] | reject('in', ['unknown', 'unavailable']) | map('float', 0) | select('>', 0) | list %}
          {% if temps | length > 0 %}
            {{ (temps | sum / temps | length) | round(1) }}
          {% else %}
            unavailable
          {% endif %}
        availability: >
          {{ expand(['sensor.arbeitszimmer_temperatur',
                     'sensor.aqara_climate_03_temperature',
                     'sensor.aqara_climate_02_temperature',
                     'sensor.qingping_air_monitor_lite_temperature'])
             | rejectattr('state', 'in', ['unknown', 'unavailable'])
             | list | length > 0 }}
        attributes:
          room_count: >
            {{ expand(['sensor.arbeitszimmer_temperatur',
                       'sensor.aqara_climate_03_temperature',
                       'sensor.aqara_climate_02_temperature',
                       'sensor.qingping_air_monitor_lite_temperature'])
               | rejectattr('state', 'in', ['unknown', 'unavailable'])
               | list | length }}

  # Weather forecast sensor with trigger
  - trigger:
      - platform: time_pattern
        minutes: "/30" # Every 30 minutes instead of every minute
      - platform: homeassistant
        event: start
      - platform: event
        event_type: event_template_reloaded
    action:
      - action: weather.get_forecasts
        target:
          entity_id: weather.fuerth_bayern
        data:
          type: daily
        response_variable: daily_forecast
    sensor:
      - name: "Fürth Daily Forecast"
        unique_id: fuerth_bayern_daily
        state: "{{ states('weather.fuerth_bayern') }}"
        attributes:
          temperature: "{{ state_attr('weather.fuerth_bayern', 'temperature') }}"
          dew_point: "{{ state_attr('weather.fuerth_bayern', 'dew_point') }}"
          temperature_unit: "{{ state_attr('weather.fuerth_bayern', 'temperature_unit') }}"
          humidity: "{{ state_attr('weather.fuerth_bayern', 'humidity') }}"
          cloud_coverage: "{{ state_attr('weather.fuerth_bayern', 'cloud_coverage') }}"
          pressure: "{{ state_attr('weather.fuerth_bayern', 'pressure') }}"
          pressure_unit: "{{ state_attr('weather.fuerth_bayern', 'pressure_unit') }}"
          wind_bearing: "{{ state_attr('weather.fuerth_bayern', 'wind_bearing') }}"
          wind_gust_speed: "{{ state_attr('weather.fuerth_bayern', 'wind_gust_speed') }}"
          wind_speed: "{{ state_attr('weather.fuerth_bayern', 'wind_speed') }}"
          wind_speed_unit: "{{ state_attr('weather.fuerth_bayern', 'wind_speed_unit') }}"
          visibility: "{{ state_attr('weather.fuerth_bayern', 'visibility') }}"
          visibility_unit: "{{ state_attr('weather.fuerth_bayern', 'visibility_unit') }}"
          precipitation: "{{ state_attr('weather.fuerth_bayern', 'precipitation') }}"
          precipitation_unit: "{{ state_attr('weather.fuerth_bayern', 'precipitation_unit') }}"
          forecast: "{{ daily_forecast['weather.fuerth_bayern'].forecast[:5] }}"

  # Strompreis PLAN-B Flow12 (ab 2025)
  - sensor:
      - name: "Strompreis aktuell"
        unique_id: strompreis_aktuell
        unit_of_measurement: "€/kWh"
        state_class: measurement
        state: "{{ 0.2876 }}"
        icon: mdi:currency-eur

      - name: "Stromkosten heute"
        unique_id: stromkosten_heute
        unit_of_measurement: "€"
        device_class: monetary
        state_class: total
        state: >-
          {{ (states('sensor.taglicher_netzbezug') | float(0) * 0.2876) | round(2) }}
        icon: mdi:cash
        availability: "{{ is_number(states('sensor.taglicher_netzbezug')) }}"

      - name: "Solar-Ersparnis heute"
        unique_id: solar_ersparnis_heute
        unit_of_measurement: "€"
        device_class: monetary
        state: >-
          {{ (states('sensor.dtu_ac_daily_energy') | float(0) / 1000 * 0.2876) | round(2) }}
        icon: mdi:piggy-bank
        availability: "{{ is_number(states('sensor.dtu_ac_daily_energy')) }}"

      - name: "Stromkosten Monat geschätzt"
        unique_id: stromkosten_monat_geschaetzt
        unit_of_measurement: "€"
        device_class: monetary
        state: >-
          {% set verbrauch_monat = states('sensor.monatlicher_netzbezug') | float(0) %}
          {% set tag_im_monat = now().day %}
          {% set tage_gesamt = ((now().replace(day=1) + timedelta(days=32)).replace(day=1) - timedelta(days=1)).day %}
          {% set durchschnitt = verbrauch_monat / tag_im_monat if tag_im_monat > 0 else 0 %}
          {% set arbeitspreis = durchschnitt * tage_gesamt * 0.2876 %}
          {% set grundpreis = 16.54 %}
          {{ (arbeitspreis + grundpreis) | round(2) }}
        icon: mdi:calendar-month
        availability: "{{ is_number(states('sensor.monatlicher_netzbezug')) }}"

  # ==========================================================================
  # Migrated from sensors.yaml (legacy "platform: template" removed in 2026.6)
  # ==========================================================================
  - sensor:
      - name: "Solarproduktion gestern"
        unique_id: solarproduktion_gestern
        unit_of_measurement: "kWh"
        device_class: energy
        state: >-
          {#
            Priority order for yesterday's solar production (kWh):
            1) UI helper input_number.solarproduktion_gestern saved at 23:55
            2) DTU daily energy statistics fallback (Wh -> kWh)
          #}
          {% set helper = states('input_number.solarproduktion_gestern') %}
          {% if helper not in ['unknown', 'unavailable', ''] and helper | float(0) > 0 %}
            {{ helper | float(0) | round(2) }}
          {% else %}
            {% set today = now().date() %}
            {% set yesterday = (today - timedelta(days=1)).isoformat() %}
            {% set stats = state_attr('sensor.dtu_ac_daily_energy', 'statistics') %}
            {% if stats %}
              {% set match = stats | selectattr('start', 'defined') | selectattr('start', 'search', yesterday) | list %}
              {% if match and match[0]['sum'] is defined %}
                {{ (match[0]['sum'] / 1000) | round(2) }}
              {% else %}
                0
              {% endif %}
            {% else %}
              0
            {% endif %}
          {% endif %}

      # Astronomie und Wetter
      - name: "Sun Azimuth"
        unique_id: sun_azimuth
        unit_of_measurement: "°"
        icon: mdi:sun-angle
        state: "{{ (state_attr('sun.sun', 'azimuth') | float(0) - 10) | round(0) }}"

      - name: "Sunlight Pct"
        unique_id: sunlight_pct
        unit_of_measurement: "%"
        icon: mdi:weather-sunny
        state: >-
          {% set elevation = state_attr('sun.sun', 'elevation') | float(0) %}
          {% set cloud_coverage = state_attr('weather.fuerth_bayern', 'cloud_coverage') | float(0) %}
          {# Base brightness: 0° = 0%, 15°+ = 100% (sunny day = 100%) #}
          {% set base = [[(elevation / 15) * 100, 0] | max, 100] | min %}
          {# Only heavy clouds (>80%) reduce brightness, max 50% reduction #}
          {% if cloud_coverage > 80 %}
            {% set cloud_factor = 1 - (0.5 * (cloud_coverage - 80) / 20) %}
          {% else %}
            {% set cloud_factor = 1 %}
          {% endif %}
          {% set brightness = base * cloud_factor %}
          {{ brightness | round }}

      - name: "Night State"
        unique_id: night_state
        icon: mdi:weather-night
        state: "{{ 1 if (has_value('sun.sun') and is_state('sun.sun', 'below_horizon')) else 0 }}"

      # Smart Home Status
      - name: "Count Lights On"
        unique_id: count_lights_on
        icon: mdi:ceiling-light
        unit_of_measurement: "Lichter"
        state: >
          {{ states.light | selectattr('state', 'eq', 'on') | list | count }}

      # Wetter und Kleidung
      - name: "What To Wear Outside"
        unique_id: what_to_wear_outside
        icon: mdi:hanger
        state: >-
          {% set temp = state_attr('weather.fuerth_bayern', 'temperature') | float(20) %}
          {% if temp <= 5 %}
            Winterjacke + Handschuhe
          {% elif temp <= 14 %}
            Pullover
          {% elif temp <= 18 %}
            Dünne Jacke
          {% else %}
            T-Shirt
          {% endif %}

      # Netz Einspeisung/Bezug (Phase-Based Calculation)
      - name: "Stromzähler Saldiert"
        unique_id: stromzahler_saldiert
        unit_of_measurement: "W"
        device_class: power
        icon: mdi:counter
        state: >
          {% set phase_a = states('sensor.strommesser_phase_a_active_power')|float(0) %}
          {% set phase_b = states('sensor.strommesser_phase_b_active_power')|float(0) %}
          {% set phase_c = states('sensor.strommesser_phase_c_active_power')|float(0) %}
          {{ (phase_a + phase_b + phase_c)|round(1) }}
        availability: >
          {{ states('sensor.strommesser_phase_a_active_power') not in ['unknown', 'unavailable']
             and states('sensor.strommesser_phase_b_active_power') not in ['unknown', 'unavailable']
             and states('sensor.strommesser_phase_c_active_power') not in ['unknown', 'unavailable'] }}

      - name: "Netzbezug"
        unique_id: netzbezug
        unit_of_measurement: "W"
        device_class: power
        icon: mdi:transmission-tower-import
        state: >
          {% set saldiert = states('sensor.stromzahler_saldiert')|float(0) %}
          {% if saldiert > 0 %}
            {{ saldiert }}
          {% else %}
            0
          {% endif %}
        availability: "{{ states('sensor.stromzahler_saldiert') not in ['unknown', 'unavailable'] }}"

      - name: "Einspeisung"
        unique_id: einspeisung
        unit_of_measurement: "W"
        device_class: power
        icon: mdi:transmission-tower-export
        state: >
          {% set saldiert = states('sensor.stromzahler_saldiert')|float(0) %}
          {% if saldiert < 0 %}
            {{ saldiert|abs }}
          {% else %}
            0
          {% endif %}
        availability: "{{ states('sensor.stromzahler_saldiert') not in ['unknown', 'unavailable'] }}"

      - name: "Hausverbrauch Gesamt"
        unique_id: hausverbrauch_gesamt
        unit_of_measurement: "W"
        device_class: power
        icon: mdi:home-lightning-bolt
        state: >
          {% set saldiert = states('sensor.stromzahler_saldiert')|float(0) %}
          {% set bkw = states('sensor.aqara_plug_02_power')|float(0) %}
          {# BKK nur addieren wenn EcoFlow einspeist; bei Netzladung steckt der
             Bezug schon in 'saldiert', sonst doppelt gezaehlt #}
          {% set ecoflow_laedt_aus_netz = states('sensor.stream_ac_pro_3683_power_grid')|float(0) > 5 %}
          {{ (saldiert + (0 if ecoflow_laedt_aus_netz else bkw))|round(1) }}
        availability: >
          {{ states('sensor.stromzahler_saldiert') not in ['unknown', 'unavailable']
             and states('sensor.aqara_plug_02_power') not in ['unknown', 'unavailable'] }}

      - name: "PV Eigenverbrauch Quote"
        unique_id: pv_eigenverbrauch_quote
        unit_of_measurement: "%"
        icon: mdi:home-lightning-bolt
        state: >
          {% set pv_heute = states('sensor.solarproduktion_gestern')|float(0) %}
          {% set einspeisung_heute = state_attr('sensor.tagliche_einspeisung', 'last_period')|float(0) if state_attr('sensor.tagliche_einspeisung', 'last_period') is not none else 0 %}
          {% if pv_heute > 0 %}
            {{ ((1 - einspeisung_heute/pv_heute) * 100)|round(0) }}
          {% else %}
            0
          {% endif %}
        availability: >
          {{ states('sensor.solarproduktion_gestern') not in ['unknown', 'unavailable'] }}

      - name: "Balkon Motion Illuminance (Safe)"
        unique_id: balkon_motion_illuminance_safe
        unit_of_measurement: "lx"
        device_class: illuminance
        icon: mdi:brightness-6
        state: >-
          {% set sensor_state = states('sensor.ikea_motion_03_illuminance') %}
          {% if sensor_state not in ['unknown', 'unavailable'] and sensor_state | float(0) >= 0 %}
            {{ sensor_state | float(0) | round(0) }}
          {% else %}
            {# Balkon-Sensor liefert keinen Wert (z.B. Sleepy-Device nach Neustart). #}
            {# Fallback sonnenstandsabhaengig: tagsueber hell (ueber Motion-Schwelle, #}
            {# kein Fehltrigger), nachts dunkel (Licht funktioniert weiter). #}
            {{ 2000 if state_attr('sun.sun', 'elevation') | float(-90) > 3 else 5 }}
          {% endif %}

  # ==========================================================================
  # Migrated from binary_sensors.yaml (legacy "platform: template" removed)
  # ==========================================================================
  - binary_sensor:
      # Netzwerk-Infrastruktur
      - name: "Fritzbox 7590 AX Running"
        unique_id: fritzbox_7590_ax_running
        state: "on"
        device_class: running
        icon: mdi:router-wireless

      - name: "Fritzrepeater 1200 AX Running"
        unique_id: fritzrepeater_1200_ax_running
        state: "on"
        device_class: running
        icon: mdi:wifi-strength-4

      - name: "Fritzrepeater 2400 Running"
        unique_id: fritzrepeater_2400_running
        state: "on"
        device_class: running
        icon: mdi:wifi-strength-4

      # Smart Home Zentrale
      - name: "Synology DS720 Running"
        unique_id: synology_ds720_running
        state: "on"
        device_class: running
        icon: mdi:nas

      - name: "Nuki Bridge Running"
        unique_id: nuki_bridge_running
        state: "on"
        device_class: running
        icon: mdi:bridge

      # Überwachung
      - name: "Camera Schlafzimmer Running"
        unique_id: camera_schlafzimmer_running
        state: "on"
        device_class: running
        icon: mdi:camera

      - name: "Camera Wohnzimmer Running"
        unique_id: camera_wohnzimmer_running
        state: "on"
        device_class: running
        icon: mdi:camera

      # Haushaltsgeräte
      - name: "Wasserspender Running"
        unique_id: wasserspender_running
        state: "on"
        device_class: running
        icon: mdi:water-pump

      - name: "Futterspender Running"
        unique_id: futterspender_running
        state: "on"
