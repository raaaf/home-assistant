        icon: mdi:fridge

      # Zustandsabhängige Geräte
      - name: "Luefter Waschzimmer Active"
        unique_id: luefter_waschzimmer_active
        state: "{{ has_value('input_select.trockner') and is_state('input_select.trockner', 'Arbeitet') }}"
